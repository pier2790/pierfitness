<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="PierFitness"/>
<meta name="theme-color" content="#0A0A0C"/>
<title>PierFitness</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0A0A0C;--bg2:#111113;--bg3:#191920;--bg4:#202028;--border:#252530;--border2:#1E1E28;--text:#EEEEF2;--muted:#666680;--muted2:#3A3A50;--green:#3DDB7A;--red:#FF4D6A;--yellow:#FFD060;--accent:#FF6B35;}
html,body{height:100%;background:var(--bg);overflow:hidden;}
body{font-family:'DM Sans',sans-serif;color:var(--text);-webkit-tap-highlight-color:transparent;}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
input[type=number]{-moz-appearance:textfield;}
*::-webkit-scrollbar{display:none;}
#app{display:flex;flex-direction:column;height:100vh;max-width:430px;margin:0 auto;}
.screen{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:72px;}
.nav{flex-shrink:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 4px;cursor:pointer;border:none;background:transparent;}
.nav-icon{font-size:20px;line-height:1;}
.nav-lbl{font-size:10px;color:var(--muted);}
.nav-btn.active .nav-lbl{color:var(--accent);}
.hdr{padding:14px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--bg);flex-shrink:0;}
.hdr-back{width:34px;height:34px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;flex-shrink:0;}
.hdr-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;}
.hdr-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.tmr-pill{display:flex;align-items:center;padding:5px 11px;border-radius:20px;border:1px solid var(--border);background:var(--bg3);cursor:pointer;}
.tmr-pill.running{border-color:var(--accent);background:rgba(255,107,53,.1);}
.tmr-pill.tdone{border-color:var(--green);background:rgba(61,219,122,.1);}
.tmr-num{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:1px;min-width:38px;text-align:center;color:var(--muted);}
.hero{padding:24px 18px 0;}
.eyebrow{font-size:10px;color:var(--muted);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:8px;}
.big-title{font-family:'Bebas Neue',sans-serif;font-size:46px;line-height:.95;letter-spacing:2px;}
.sec{padding:18px 18px 0;}
.sec-lbl{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;font-weight:600;margin-bottom:12px;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:16px 18px 0;}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:13px;padding:14px;}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:1px;}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:3px;}
.days-list{padding:12px 18px 0;display:flex;flex-direction:column;gap:8px;}
.day-card{border-radius:14px;border:1px solid var(--border);background:var(--bg2);padding:14px 14px 14px 18px;cursor:pointer;position:relative;overflow:hidden;}
.day-card:active{transform:scale(.98);}
.day-stripe{position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:14px 0 0 14px;}
.day-top{display:flex;justify-content:space-between;align-items:center;}
.day-gnum{font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:2px;color:var(--muted);}
.day-name{font-size:15px;font-weight:600;margin-top:2px;}
.day-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.day-badge{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:600;white-space:nowrap;}
.day-wk-pips{display:flex;gap:3px;margin-top:9px;}
.pip{width:20px;height:4px;border-radius:2px;background:var(--border);}
.pip.done{background:var(--green);}
.pip.active{background:var(--accent);}
.wk-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 18px 140px;}
.active-week-bar{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding:10px 13px;background:rgba(255,107,53,.07);border:1px solid rgba(255,107,53,.2);border-radius:11px;}
.aw-lbl{font-size:11px;color:var(--muted);flex:1;}
.aw-val{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--accent);}
.aw-arrows{display:flex;gap:4px;}
.aw-btn{width:28px;height:28px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
.ex-card{background:var(--bg2);border:1px solid var(--border);border-radius:13px;margin-bottom:10px;overflow:hidden;}
.ex-hdr{padding:12px 13px;cursor:pointer;display:flex;align-items:center;gap:8px;}
.ex-badge{font-family:'Bebas Neue',sans-serif;font-size:12px;width:22px;height:22px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ex-name{font-size:14px;font-weight:600;line-height:1.3;}
.ex-actions{display:flex;gap:6px;margin-left:auto;flex-shrink:0;}
.ex-icon-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.ex-chevron{font-size:16px;color:var(--muted);transition:transform .2s;}
.ex-body{padding:0 13px 13px;}
.note-card{background:var(--bg2);border:1px solid var(--border);border-radius:13px;margin-bottom:10px;overflow:hidden;}
.note-card-hdr{padding:11px 13px;cursor:pointer;display:flex;align-items:center;gap:8px;}
.note-card-body{padding:0 13px 13px;}
.note-inp{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:10px 12px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;resize:none;min-height:72px;line-height:1.6;}
.note-inp:focus{outline:none;border-color:var(--yellow);}
.note-inp::placeholder{color:var(--muted2);}
.save-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;padding:8px 18px 18px;background:linear-gradient(transparent,var(--bg) 35%);display:flex;gap:8px;z-index:55;}
.btn{flex:1;padding:13px;border-radius:13px;border:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-ghost{background:var(--bg3);color:var(--text);border:1px solid var(--border);}
.active-sets{display:flex;flex-direction:column;gap:5px;}
.active-set-row{display:grid;grid-template-columns:16px 1fr 1fr 30px 26px;gap:5px;align-items:center;}
.s-n{font-family:'Bebas Neue',sans-serif;font-size:12px;color:var(--muted);text-align:center;}
.s-inp{background:var(--bg4);border:1px solid var(--border);border-radius:7px;padding:8px 4px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;width:100%;text-align:center;transition:border-color .2s,background .2s;}
.s-inp:focus{outline:none;border-color:var(--accent);}
.s-inp::placeholder{color:var(--muted2);font-size:10px;}
.chk-btn{width:30px;height:36px;border-radius:7px;border:1px solid var(--border);background:var(--bg3);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;}
.chk-btn.done{background:rgba(61,219,122,.15);border-color:var(--green);color:var(--green);}
.chk-btn:active{transform:scale(.88);}
.add-serie-btn{margin-top:6px;width:100%;padding:7px;background:transparent;border:1px dashed var(--border);border-radius:7px;color:var(--muted);font-size:11px;font-family:'DM Sans',sans-serif;cursor:pointer;}
.ex-nota-inp{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 11px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;resize:none;min-height:48px;line-height:1.5;}
.ex-nota-inp:focus{outline:none;border-color:var(--yellow);}
.ex-nota-inp::placeholder{color:var(--muted2);}
.perf-wrap{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:flex-end;}
.perf-sheet{width:100%;max-width:430px;margin:0 auto;background:var(--bg2);border-radius:24px 24px 0 0;border-top:1px solid var(--border);height:90vh;display:flex;flex-direction:column;}
.perf-handle{width:34px;height:4px;background:var(--border);border-radius:2px;margin:11px auto 0;}
.perf-hdr{padding:12px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);}
.perf-ttl{font-weight:600;font-size:14px;flex:1;}
.perf-x{color:var(--muted);font-size:14px;cursor:pointer;padding:5px 9px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);}
.perf-body{padding:8px 0 24px;overflow-y:auto;flex:1;min-height:0;}
.perf-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border2);}
.perf-row:last-child{border-bottom:none;}
.perf-wk{font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--muted);width:28px;flex-shrink:0;}
.perf-sets{flex:1;display:flex;flex-wrap:wrap;gap:4px;}
.perf-set{padding:3px 8px;background:var(--bg3);border-radius:6px;font-size:11px;}
.perf-max{font-family:'Bebas Neue',sans-serif;font-size:16px;text-align:right;flex-shrink:0;width:52px;}
.delta-up{color:var(--green);}.delta-dn{color:var(--red);}.delta-eq{color:var(--muted);}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:300;display:flex;align-items:center;justify-content:center;}
.timer-box{background:var(--bg2);border:1px solid var(--border);border-radius:24px;padding:28px 36px;display:flex;flex-direction:column;align-items:center;gap:16px;min-width:260px;}
.timer-big{font-family:'Bebas Neue',sans-serif;font-size:72px;letter-spacing:4px;line-height:1;}
.timer-presets{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.t-pre{padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg3);color:var(--muted);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.t-btns{display:flex;gap:8px;}
.t-btn{padding:10px 18px;border-radius:11px;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;}
.ai-wrap{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;}
.ai-sheet{width:100%;max-width:430px;margin:0 auto;background:var(--bg2);border-radius:24px 24px 0 0;border-top:1px solid var(--border);height:72vh;display:flex;flex-direction:column;}
.ai-handle{width:34px;height:4px;background:var(--border);border-radius:2px;margin:11px auto 0;}
.ai-hdr{padding:10px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);}
.ai-ttl{font-weight:600;font-size:15px;}
.ai-sub{font-size:11px;color:var(--muted);}
.ai-x{margin-left:auto;color:var(--muted);font-size:14px;cursor:pointer;padding:5px 9px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);}
.ai-msgs{flex:1;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:10px;}
.msg{max-width:90%;}
.msg.user{align-self:flex-end;}
.msg.ai{align-self:flex-start;}
.msg-b{padding:10px 13px;border-radius:15px;font-size:13px;line-height:1.55;white-space:pre-wrap;}
.msg.user .msg-b{background:var(--accent);color:#fff;border-radius:15px 15px 4px 15px;}
.msg.ai .msg-b{background:var(--bg3);border:1px solid var(--border);border-radius:4px 15px 15px 15px;}
.typing{display:flex;gap:4px;align-items:center;}
.dot{width:6px;height:6px;background:var(--muted);border-radius:50%;animation:bounce 1.2s infinite;}
.dot:nth-child(2){animation-delay:.2s;}.dot:nth-child(3){animation-delay:.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-6px);}}
.ai-chips{display:flex;gap:6px;padding:8px 18px;overflow-x:auto;border-top:1px solid var(--border);}
.chip{flex-shrink:0;padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg3);color:var(--muted);font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;}
.ai-inp-row{padding:10px 14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end;}
.ai-ta{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:10px 13px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;resize:none;max-height:90px;min-height:40px;}
.ai-ta:focus{outline:none;border-color:var(--accent);}
.ai-send{width:40px;height:40px;border-radius:11px;background:var(--accent);border:none;color:#fff;font-size:16px;cursor:pointer;flex-shrink:0;}
.ai-send:disabled{opacity:.3;}
/* WEIGHT */
.w-day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:10px;}
.w-day-col{display:flex;flex-direction:column;align-items:center;gap:4px;}
.w-day-lbl{font-size:9px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;}
.w-day-inp{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 2px;color:var(--text);font-size:14px;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;text-align:center;}
.w-day-inp:focus{outline:none;border-color:var(--accent);}
.w-day-inp::placeholder{color:var(--muted2);font-size:10px;font-family:'DM Sans',sans-serif;}
.w-stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:14px 18px 0;}
.w-stat{background:var(--bg2);border:1px solid var(--border);border-radius:13px;padding:14px 10px;text-align:center;}
.w-stat-val{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;}
.w-stat-lbl{font-size:10px;color:var(--muted);margin-top:3px;}
.chart-box{margin:14px 18px 0;background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:16px;}
.chart-lbl{font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px;}
.w-hist-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border2);}
.w-hist-row:last-child{border-bottom:none;}
.w-hist-kg{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;}
.empty{display:flex;flex-direction:column;align-items:center;padding:60px 20px;color:var(--muted);text-align:center;gap:10px;}
.empty-icon{font-size:40px;opacity:.4;}
/* ESERCIZI DB */
.srch-bar{margin:14px 18px 0;display:flex;gap:8px;align-items:center;}
.srch-inp{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:11px;padding:10px 14px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;}
.srch-inp:focus{outline:none;border-color:var(--accent);}
.srch-inp::placeholder{color:var(--muted2);}
.muscle-tabs{display:flex;gap:6px;padding:10px 18px 0;overflow-x:auto;}
.m-tab{flex-shrink:0;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg3);color:var(--muted);font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;}
.m-tab.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.filter-tab{flex-shrink:0;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg3);color:var(--muted);font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;}
.filter-tab.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.ex-db-list{padding:10px 18px 0;}
.ex-db-item{background:var(--bg2);border:1px solid var(--border);border-radius:11px;margin-bottom:6px;padding:12px 14px;display:flex;align-items:center;gap:10px;}
.ex-db-mus{font-size:10px;padding:2px 8px;border-radius:8px;font-weight:600;white-space:nowrap;flex-shrink:0;}
.ex-db-name{font-size:13px;font-weight:600;flex:1;}
.ex-db-sub{font-size:11px;color:var(--muted);margin-top:2px;}
/* SCHEDA PICKER */
.overlay-bottom{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:150;display:flex;align-items:flex-end;}
.sheet{width:100%;max-width:430px;margin:0 auto;background:var(--bg2);border-radius:24px 24px 0 0;border-top:1px solid var(--border);max-height:75vh;overflow-y:auto;padding:20px 18px 34px;}
.sheet-handle{width:34px;height:4px;background:var(--border);border-radius:2px;margin:-8px auto 16px;}
.scheda-picker-item{padding:14px;border-radius:13px;border:1px solid var(--border);background:var(--bg3);margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:12px;}
.scheda-picker-item.active-scheda{border-color:var(--accent);background:rgba(255,107,53,.08);}
.install-banner{margin:14px 18px 0;padding:11px 13px;background:rgba(61,219,122,.07);border:1px solid rgba(61,219,122,.2);border-radius:12px;display:flex;align-items:flex-start;gap:10px;}
.install-txt{font-size:11px;color:var(--muted);line-height:1.5;}
.install-txt strong{color:var(--green);display:block;margin-bottom:2px;font-size:12px;}
/* DASHBOARD */
.dash-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:10px;}
.dash-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.dash-val{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:1px;line-height:1;}
.dash-lbl{font-size:10px;color:var(--muted);margin-top:4px;letter-spacing:.5px;}
.dash-trend{font-size:11px;font-weight:700;margin-top:6px;}
.streak-fire{display:inline-block;animation:pulse 1.5s ease infinite;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.15);}}
/* PR WALL */
.pr-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;position:relative;overflow:hidden;}
.pr-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;}
.pr-medal{font-size:22px;flex-shrink:0;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:10px;background:var(--bg3);}
.pr-info{flex:1;min-width:0;}
.pr-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pr-sub{font-size:10px;color:var(--muted);margin-top:2px;}
.pr-kg{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--accent);line-height:1;flex-shrink:0;text-align:right;}
.pr-kg-unit{font-size:11px;color:var(--muted);font-family:'DM Sans',sans-serif;}
/* SMART INPUT */
.s-inp.smart-hint{border-color:var(--yellow) !important;background:rgba(255,208,96,.08) !important;}
.s-inp.validated{border-color:var(--green) !important;}
/* UNDO TOAST */
.undo-toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border);border-radius:13px;padding:10px 16px;display:flex;align-items:center;gap:10px;z-index:300;box-shadow:0 8px 32px rgba(0,0,0,.5);animation:slideUp .3s ease;}
.undo-toast-btn{padding:6px 14px;border-radius:8px;border:1px solid var(--accent);background:rgba(255,107,53,.12);color:var(--accent);font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;}
@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(20px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
/* 1RM badge */
.orm-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:8px;background:rgba(199,125,255,.1);border:1px solid rgba(199,125,255,.2);font-size:10px;color:#C77DFF;font-weight:700;}
/* CALCULATOR */
.calc-wrap{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.calc-sheet{width:100%;max-width:430px;background:var(--bg2);border-radius:24px 24px 0 0;border-top:1px solid var(--border);padding:20px 18px 34px;}
.calc-display{background:var(--bg4);border:1px solid var(--border);border-radius:14px;padding:14px 18px;margin-bottom:14px;min-height:60px;text-align:right;}
.calc-expr{font-size:14px;color:var(--muted);min-height:18px;word-break:break-all;}
.calc-result{font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:2px;color:var(--text);word-break:break-all;}
.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.calc-btn{padding:16px 8px;border-radius:12px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:20px;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;cursor:pointer;text-align:center;-webkit-tap-highlight-color:transparent;}
.calc-btn:active{background:var(--bg4);}
.calc-btn.op{background:rgba(255,107,53,.1);border-color:rgba(255,107,53,.3);color:var(--accent);}
.calc-btn.eq{background:var(--accent);color:#fff;border-color:var(--accent);}
.calc-btn.fn{background:rgba(199,125,255,.08);border-color:rgba(199,125,255,.2);color:#C77DFF;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:600;}
</style>

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function fmtT(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}

function autoDetectWeek(giornoId){
  var sc=SCHEDE[S.schedaId];
  for(var w=1;w<=sc.settimane;w++){
    var d=LS.get(K.session(S.schedaId,giornoId,w));
    if(!d||!d.savedAt)return w;
  }
  return sc.settimane;
}

function loadAllWeeks(giornoId){
  var sc=SCHEDE[S.schedaId],g=sc.giorni.filter(function(x){return x.id===giornoId;})[0];
  var logs={};
  for(var w=1;w<=sc.settimane;w++){
    var saved=LS.get(K.session(S.schedaId,giornoId,w));
    if(saved){logs[w]=saved;}
    else{
      // Pre-fill dai valori dell'ultima settimana salvata
      var prefill=null;
      for(var pw=w-1;pw>=1;pw--){var plog=logs[pw];if(plog&&plog.savedAt){prefill=plog;break;}}
      if(prefill){
        logs[w]={noteAllenamento:'',savedAt:null,esercizi:prefill.esercizi.map(function(ex){
          return{id:ex.id,nome:ex.nome,nota:'',serie:ex.serie.map(function(s){return{kg:s.kg,reps:s.reps,done:false};})};
        })};
      }else{
        logs[w]={noteAllenamento:'',savedAt:null,esercizi:g.esercizi.map(function(ex){
          return{id:ex.id,nome:ex.nome,nota:'',serie:ex.serie.map(function(s){return{kg:s.kg,reps:s.reps,done:false};})};
        })};
      }
    }
  }
  return logs;
}

function getWeekNote(ex,w){
  return{base:ex.note||'',override:ex.noteW&&ex.noteW[w]?ex.noteW[w]:''};
}

function getExLog(exId,week){
  var log=S.weekLogs[week];
  if(!log)return null;
  return log.esercizi.filter(function(e){return e.id===exId;})[0]||null;
}

function saveWeek(week){
  var log=S.weekLogs[week];if(!log)return;
  var key=K.session(S.schedaId,S.giorno.id,week);
  // Undo: save previous state
  var prev=LS.get(key);
  if(prev)pushUndo('W'+week+' G'+S.giorno.id,key,prev);
  // Smart reps: auto-separate concatenated reps on save
  (log.esercizi||[]).forEach(function(ex){
    (ex.serie||[]).forEach(function(s){
      if(s.reps&&String(s.reps).length>=3&&!/\s/.test(s.reps)&&!/[a-zA-Z]/.test(s.reps)){
        s.reps=smartReps(s.reps);
      }
    });
  });
  log.savedAt=new Date().toISOString();
  LS.set(key,log);
  clearDraft();
  showUndoToast('Settimana '+week+' salvata');
  // Auto cloud push (silent - non blocca UI)
  if(S.cloudKey&&S.cloudBin)cloudPush(true);
  // Google Sheets sync
  syncWeekToSheets(week);
}

function dayProgress(giornoId){
  var sc=SCHEDE[S.schedaId],done=0;
  for(var w=1;w<=sc.settimane;w++){
    var d=LS.get(K.session(S.schedaId,giornoId,w));
    if(d&&d.savedAt)done++;
  }
  return done;
}

// ─── COLOR CODING (progressione settimane) ────────────────────────────────────
function serieColor(exId,w,si,field){
  // confronta con settimana precedente salvata
  if(w<=1)return{};
  var prevLog=getExLog(exId,w-1);
  var curLog=getExLog(exId,w);
  if(!prevLog||!curLog)return{};
  var prev=prevLog.serie[si];
  var cur=curLog.serie[si];
  if(!prev||!cur)return{};
  var pv=parseFloat(String(prev[field]).replace(',','.')),cv=parseFloat(String(cur[field]).replace(',','.'));
  if(isNaN(pv)||isNaN(cv)||pv<=0||cv<=0)return{};
  if(field==='kg'){
    if(cv>pv)return{bc:'var(--green)',bg:'rgba(61,219,122,.1)'};
    if(cv<pv)return{bc:'var(--red)',bg:'rgba(255,77,106,.1)'};
  }
  if(field==='reps'){
    if(cv>pv)return{bc:'var(--yellow)',bg:'rgba(255,208,96,.1)'};
    if(cv<pv)return{bc:'var(--red)',bg:'rgba(255,77,106,.08)'};
  }
  return{};
}

// ─── COMPACT WEEK DISPLAY ────────────────────────────────────────────────────
function compactWeekHtml(exId,w,isSaved){
  if(!isSaved)return '<span style="color:var(--muted2);font-size:12px;">—</span>';
  var log=getExLog(exId,w);
  if(!log||!log.serie||!log.serie.length)return '<span style="color:var(--muted2);font-size:12px;">—</span>';
  var prevLog=w>1?getExLog(exId,w-1):null;
  var prevMaxKg=0,prevTotalReps=0;
  if(prevLog&&prevLog.serie){prevLog.serie.forEach(function(s){var kv=parseFloat(String(s.kg||'').replace(',','.'));if(!isNaN(kv)&&kv>prevMaxKg)prevMaxKg=kv;var rv=parseFloat(String(s.reps||'').replace(',','.'));if(!isNaN(rv))prevTotalReps+=rv;});}
  var curMaxKg=0,curTotalReps=0;
  log.serie.forEach(function(s){var kv=parseFloat(String(s.kg||'').replace(',','.'));if(!isNaN(kv)&&kv>curMaxKg)curMaxKg=kv;var rv=parseFloat(String(s.reps||'').replace(',','.'));if(!isNaN(rv))curTotalReps+=rv;});
  var kgColor='var(--text)';
  if(prevMaxKg>0&&curMaxKg>0){if(curMaxKg>prevMaxKg)kgColor='var(--green)';else if(curMaxKg<prevMaxKg)kgColor='var(--red)';}
  var repsColor='var(--text)';
  if(prevTotalReps>0&&curTotalReps>0){if(curTotalReps>prevTotalReps)repsColor='var(--yellow)';else if(curTotalReps<prevTotalReps)repsColor='var(--red)';}
  // group sets by kg
  var groups=[];
  log.serie.forEach(function(s){var kg=String(s.kg||'');var reps=String(s.reps||'?');var last=groups[groups.length-1];if(last&&last.kg===kg){last.reps.push(reps);}else{groups.push({kg:kg,reps:[reps]});}});
  var parts=groups.map(function(g){
    var kgPart=g.kg?'<b style="color:'+kgColor+'">'+htmlEsc(g.kg)+'kg</b> <span style="color:var(--muted2)">→</span> ':'';
    return kgPart+'<span style="color:'+repsColor+'">'+g.reps.map(htmlEsc).join(' ')+'</span>';
  });
  var nota=log.nota?'<div style="font-size:11px;color:var(--muted);margin-top:3px;font-style:italic;">'+htmlEsc(log.nota)+'</div>':'';
  return '<div style="font-size:13px;line-height:1.8;">'+parts.join(' <span style="color:var(--border2);padding:0 1px">·</span> ')+'</div>'+nota;
}

// ─── WEIGHT HELPERS ───────────────────────────────────────────────────────────
function getISOWeekKey(date){
  var d=new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));
  d.setUTCDate(d.getUTCDate()+4-(d.getUTCDay()||7));
  var y=d.getUTCFullYear();
  var w=Math.ceil(((d-new Date(Date.UTC(y,0,1)))/86400000+1)/7);
  return y+'-W'+String(w).padStart(2,'0');
}

function getCurrentWeekKey(){return getISOWeekKey(new Date());}

function getWeekDays(wk){
  // wk = "2026-W05", returns array of 7 Date objects (Mon-Sun)
  var parts=wk.split('-W');
  var y=parseInt(parts[0]),w=parseInt(parts[1]);
  var jan4=new Date(Date.UTC(y,0,4));
  var mon=new Date(jan4);
  mon.setUTCDate(jan4.getUTCDate()-(jan4.getUTCDay()||7)+1+(w-1)*7);
  var days=[];
  for(var i=0;i<7;i++){var d=new Date(mon);d.setUTCDate(mon.getUTCDate()+i);days.push(d);}
  return days;
}

function loadWeightWeek(wk){
  return LS.get('pier_ww_'+wk)||{days:[null,null,null,null,null,null,null]};
}

function saveWeightDay(wk,dayIdx,kg){
  var data=loadWeightWeek(wk);
  data.days[dayIdx]=kg;
  LS.set('pier_ww_'+wk,data);
  // Google Sheets sync
  var days=getWeekDays(wk);
  if(days[dayIdx]){var dateStr=days[dayIdx].toISOString().slice(0,10);syncWeightToSheets(dateStr,kg);}
}

function getWeightHistory(){
  // gather all stored weeks
  var keys=LS.keys('pier_ww_');
  var weeks=keys.map(function(k){
    var wk=k.replace('pier_ww_','');
    var data=loadWeightWeek(wk);
    var vals=data.days.filter(function(v){return v!==null&&!isNaN(v);});
    var avg=vals.length?Math.round((vals.reduce(function(a,b){return a+b;},0)/vals.length)*100)/100:null;
    return{wk:wk,days:data.days,avg:avg,count:vals.length};
  }).filter(function(x){return x.avg!==null;});
  // also include legacy single-day entries grouped by week
  var legacy=LS.get(K.weight)||[];
  // legacy is already included from new system or not, skip for now
  weeks.sort(function(a,b){return a.wk.localeCompare(b.wk);});
  return weeks;
}

// ── Timer audio: genera beep con Web Audio API (no file esterni) ──
function timerBeep(done){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    function beep(freq,start,dur,vol){
      var o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=freq;o.type='sine';
      g.gain.setValueAtTime(vol||0.4,ctx.currentTime+start);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+start+dur);
      o.start(ctx.currentTime+start);o.stop(ctx.currentTime+start+dur+0.05);
    }
    if(done){
      // 3 beep ascendenti - recupero finito!
      beep(440,0,0.15);beep(550,0.2,0.15);beep(660,0.4,0.3,0.6);
    } else {
      // beep singolo breve - tick a 10 sec dal termine
      beep(880,0,0.08,0.2);
    }
  }catch(e){}
  // Vibrazione mobile
  if(done&&navigator.vibrate){navigator.vibrate([200,100,200,100,400]);}
  else if(navigator.vibrate){navigator.vibrate(50);}
}
function timerBeepCount(secsLeft){
  // Suono acuto crescente per gli ultimi 5 secondi (square wave, 700→→→→→→1300Hz)
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    var freq=700+(5-secsLeft)*150; // 5→700, 4→850, 3→1000, 2→1150, 1→1300
    var o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.frequency.value=freq;o.type='square';
    g.gain.setValueAtTime(0.25,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.12);
    o.start(ctx.currentTime);o.stop(ctx.currentTime+0.15);
  }catch(e){}
  if(navigator.vibrate){navigator.vibrate(30);}
}

function timerRequestNotifPerm(){
  if('Notification' in window&&Notification.permission==='default'){
    Notification.requestPermission();
  }
}

function timerStart(t){
  if(S.timerIv)clearInterval(S.timerIv);
  timerRequestNotifPerm();
  var v=t!==undefined?t:S.timerTarget;
  S.timerTarget=v;S.timerSecs=v;S.timerRun=true;S.timerDone=false;
  S.timerIv=setInterval(function(){
    S.timerSecs--;
    // Avviso a 10 secondi dalla fine
    if(S.timerSecs===10){timerBeep(false);}
    // Countdown sonoro ultimi 5 secondi
    if(S.timerSecs>=1&&S.timerSecs<=5){timerBeepCount(S.timerSecs);}
    if(S.timerSecs<=0){
      clearInterval(S.timerIv);S.timerRun=false;S.timerDone=true;S.timerSecs=0;
      timerBeep(true);
      // Notifica push se app in background
      if('Notification' in window&&Notification.permission==='granted'){
        try{new Notification('PierFitness ⏱',{body:'Recupero finito! Prossima serie 💪',icon:'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⏱</text></svg>',silent:true});}catch(e){}
      }
    }
    refreshTimerPill();
    if(S.showTimer)renderModal();
  },1000);
}

// ─── SMART REPS: auto-separate concatenated reps ─────────────────────────────
function smartReps(val){
  // Detect concatenated reps patterns and insert spaces
  // e.g. "777" → "7 7 7", "1010" → "10 10", "887" → "8 8 7", "121110" → "12 11 10"
  val=String(val||'').trim();
  if(!val||/\s/.test(val)||/[a-zA-Z]/.test(val))return val; // already spaced or text
  if(val.length<3)return val;
  // Try to detect patterns: all same digit repeated, or common rep numbers
  // Strategy: try splitting into groups of 1-2 digits that look like reps (1-30 range)
  var best=null,bestScore=0;
  function tryWidth(w){
    if(val.length%w!==0)return null;
    var parts=[];
    for(var i=0;i<val.length;i+=w){
      var n=parseInt(val.substr(i,w));
      if(isNaN(n)||n<1||n>30)return null;
      parts.push(n);
    }
    if(parts.length<2||parts.length>8)return null;
    // Score: prefer solutions where reps are similar to each other (common in training)
    var avg=parts.reduce(function(a,b){return a+b;},0)/parts.length;
    var variance=parts.reduce(function(a,b){return a+Math.abs(b-avg);},0)/parts.length;
    var score=parts.length*10-variance*3;
    return{parts:parts,score:score};
  }
  // Try width 1 (single digit reps: 777→7 7 7) and width 2 (double digit: 1010→10 10)
  var r1=tryWidth(1),r2=tryWidth(2);
  // Also try mixed: 2+2+1 for "88 7" pattern (length 3)
  // Check for mixed splits like "887" → [8,8,7]
  if(!r2&&val.length===3){
    var a=parseInt(val[0]),b=parseInt(val[1]),c=parseInt(val[2]);
    if(a>=1&&a<=9&&b>=1&&b<=9&&c>=1&&c<=9&&Math.abs(a-b)<=3&&Math.abs(b-c)<=3){
      return a+' '+b+' '+c;
    }
  }
  if(!r2&&val.length===5){
    // try 2+2+1 or 2+1+2 or 1+2+2
    var combos=[[2,2,1],[2,1,2],[1,2,2]];
    for(var ci=0;ci<combos.length;ci++){
      var lens=combos[ci],pos=0,ok=true,parts2=[];
      for(var pi=0;pi<lens.length;pi++){
        var n2=parseInt(val.substr(pos,lens[pi]));
        if(isNaN(n2)||n2<1||n2>30){ok=false;break;}
        parts2.push(n2);pos+=lens[pi];
      }
      if(ok&&pos===val.length)return parts2.join(' ');
    }
  }
  if(r2&&r1){best=r2.score>=r1.score?r2:r1;}
  else best=r2||r1;
  if(best)return best.parts.join(' ');
  return val;
}

// ─── 1RM CALCULATOR (Epley formula) ──────────────────────────────────────────
function calc1RM(kg,reps){
  kg=parseFloat(String(kg).replace(',','.'));
  reps=parseInt(reps);
  if(!kg||kg<=0||!reps||reps<=0)return null;
  if(reps===1)return kg;
  return Math.round(kg*(1+reps/30)*10)/10;
}

function getBest1RM(serie){
  if(!serie||!serie.length)return null;
  var best=null;
  serie.forEach(function(s){
    if(!s.kg||!s.reps)return;
    var r=parseInt(String(s.reps).replace(/[^0-9]/g,''));
    var k=parseFloat(String(s.kg).replace(',','.'));
    if(!k||!r)return;
    var orm=calc1RM(k,r);
    if(orm&&(!best||orm>best))best=orm;
  });
  return best;
}

// ─── VOLUME CALCULATOR ───────────────────────────────────────────────────────
function calcWeekVolume(schedaId,week){
  var sc=SCHEDE[schedaId];if(!sc)return{sets:0,volume:0,exercises:0};
  var totalSets=0,totalVol=0,totalEx=0;
  sc.giorni.forEach(function(g){
    var d=LS.get('pier_s'+schedaId+'_g'+g.id+'_w'+week);
    if(!d||!d.savedAt||!d.esercizi)return;
    d.esercizi.forEach(function(ex){
      if(!ex.serie||!ex.serie.length)return;
      var hasDone=false;
      ex.serie.forEach(function(s){
        if(s.done){
          hasDone=true;totalSets++;
          var kg=parseFloat(String(s.kg||'').replace(',','.'))||0;
          var reps=parseInt(String(s.reps||'').replace(/[^0-9]/g,''))||0;
          totalVol+=kg*reps;
        }
      });
      if(hasDone)totalEx++;
    });
  });
  return{sets:totalSets,volume:Math.round(totalVol),exercises:totalEx};
}

function getTrainingStreak(schedaId){
  var sc=SCHEDE[schedaId];if(!sc)return 0;
  var streak=0;
  for(var w=sc.settimane;w>=1;w--){
    var hasSaved=false;
    for(var gi=0;gi<sc.giorni.length;gi++){
      var d=LS.get('pier_s'+schedaId+'_g'+sc.giorni[gi].id+'_w'+w);
      if(d&&d.savedAt){hasSaved=true;break;}
    }
    if(hasSaved)streak++;
    else break;
  }
  return streak;
}

// ─── PR EXTRACTION ───────────────────────────────────────────────────────────
function getAllPRs(){

    var sid=m[1],wnum=parseInt(m[3]);

    d.esercizi.forEach(function(ex){
      if(!ex.nome||!ex.serie||!ex.serie.length)return;
      var nome=ex.nome;
      if(!prs[nome])prs[nome]={bestKg:0,bestReps:0,best1RM:0,scheda:sid,week:0,muscle:''};
      ex.serie.forEach(function(s){

        var kg=parseFloat(String(s.kg||'').replace(',','.'))||0;
        var reps=parseInt(String(s.reps||'').replace(/[^0-9]/g,''))||0;
        if(kg>prs[nome].bestKg){prs[nome].bestKg=kg;prs[nome].week=wnum;prs[nome].scheda=sid;}
        if(reps>prs[nome].bestReps)prs[nome].bestReps=reps;
        var orm=calc1RM(kg,reps);
        if(orm&&orm>prs[nome].best1RM)prs[nome].best1RM=orm;
      });
      // Match muscle from DB

// ─── CALCULATOR ──────────────────────────────────────────────────────────────
function calcPress(btn){
  if(btn==='C'){S.calcExpr='';S.calcResult='0';return;}
  if(btn==='⌫'){S.calcExpr=S.calcExpr.slice(0,-1);calcEval();return;}
  if(btn==='='){calcEval();S.calcExpr=S.calcResult;S.calcResult=S.calcResult;return;}
  // Map display chars to real operators
  var ch=btn==='×'?'*':btn==='÷'?'/':btn==='−'?'-':btn;
  S.calcExpr+=ch;
  calcEval();
}
function calcEval(){
  if(!S.calcExpr){S.calcResult='0';return;}
  try{
    // Safe evaluation: only allow numbers, operators, parens, decimal points
    var expr=S.calcExpr.replace(/[^0-9+\-*/().]/g,'');
    if(!expr||/[+\-*/]{2,}/.test(expr)){return;}
    // Validate balanced parens
    var depth=0;for(var ci=0;ci<expr.length;ci++){if(expr[ci]==='(')depth++;if(expr[ci]===')')depth--;if(depth<0)return;}
    if(depth!==0)return;
    // Block anything that's not a simple math expression
    if(/[a-zA-Z_$]/.test(expr))return;
    var r=Function('"use strict";return ('+expr+')')();
    if(isNaN(r)||!isFinite(r)){S.calcResult='Errore';return;}
    S.calcResult=String(Math.round(r*1000)/1000);
  }catch(e){
    // partial expression, just show what we have
  }
}
function calcFn(fn){
  var v=parseFloat(S.calcResult)||0;
  if(fn==='minus20'){S.calcResult=String(Math.round(v*0.8*100)/100);S.calcExpr=v+' × 0.8';}
  else if(fn==='minus30'){S.calcResult=String(Math.round(v*0.7*100)/100);S.calcExpr=v+' × 0.7';}
  else if(fn==='pct'){S.calcExpr=S.calcResult+'*';} // user types next number then presses %
  else if(fn==='1rm'){
    // Prompt: use current result as kg, ask for reps
    var reps=prompt('Reps eseguite con '+v+' kg?');
    if(reps){
      var r=parseInt(reps);
      if(r>0){
        var orm=Math.round(v*(1+r/30)*10)/10;
        S.calcResult=String(orm);
        S.calcExpr=v+' × (1+'+r+'/30) = 1RM';
      }
    }
  }
}

// ─── IMPORT SCHEDA DA EXCEL ───────────────────────────────────────────────────
var DAY_COLORS = ['#FF6B35','#4ECDC4','#4ECD74','#FFD93D','#C77DFF','#FF8FA3','#3DDB7A','#FFB347'];

// ─── IMPORT SCHEDA ────────────────────────────────────────────────────────────
function importScheda(file){
  if(!file)return;
  var ext=file.name.split('.').pop().toLowerCase();
  if(ext==='xlsx'||ext==='xls')importSchedaExcel(file);
  else if(ext==='docx')importSchedaDocx(file);
  else alert('Formato non supportato. Carica .xlsx oppure .docx');
}

function importSchedaExcel(file){
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=new Uint8Array(e.target.result);
      var wb=XLSX.read(data,{type:'array'});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});

      // Metadata
      var titleStr='',athlete='';
      for(var ri=0;ri<Math.min(12,rows.length);ri++){
        var rb=rows[ri]&&rows[ri][1]?rows[ri][1].toString().trim():'';
        if(/DURATA|SETTIMAN/i.test(rb)){titleStr=rb;break;}
      }
      var weekMatch=titleStr.match(/(\d+)\s*SETTIM/i);
      var settimane=weekMatch?parseInt(weekMatch[1]):7;

      // Scheda ID from filename
      var fnMatch=file.name.match(/(\d{2,3})/);
      var schedaId=fnMatch?fnMatch[1]:String(Date.now()).slice(-4);
      while(SCHEDE[schedaId])schedaId=schedaId+'b';

      // Parse giorni + esercizi
      var giorni=[],currentGiorno=null;
      rows.forEach(function(row){
        if(!row)return;
        var colB=row[1]?row[1].toString().trim():'';
        var colC=row[2]?row[2].toString().trim().toUpperCase():'';
        if(!colB)return;

        // Day header: "GIORNO X"
        if(/^GIORNO\s+\d/i.test(colB)){
          var dayNum=parseInt(colB.match(/\d+/)[0]);
          currentGiorno={id:dayNum,nome:'Giorno '+dayNum,colore:DAY_COLORS[(dayNum-1)%DAY_COLORS.length],esercizi:[]};
          giorni.push(currentGiorno);
          return;
        }

        // Exercise row: colC === 'LIBERO'
        if(currentGiorno&&colB.length>3&&colC==='LIBERO'){
          // col D=index 3=W1, col E=index 4=W2, ... col J=index 9=W7
          var prescr={};
          for(var w=1;w<=settimane;w++){
            var v=row[2+w]; // 2+1=3=D, 2+2=4=E, ...
            if(v&&v.toString().trim())prescr[w]=v.toString().trim();
          }
          var baseNote=prescr[1]||'';
          // Fill blanks with baseNote
          for(var w=1;w<=settimane;w++){if(!prescr[w])prescr[w]=baseNote;}
          // Use most-common value as base (avoids W1 parenthetical marking W2-W4 as "CAMBIA")
          var freq={};
          for(var w=1;w<=settimane;w++){var pv=prescr[w];if(pv)freq[pv]=(freq[pv]||0)+1;}
          var maxF=0;
          Object.keys(freq).forEach(function(v){if(freq[v]>maxF){maxF=freq[v];baseNote=v;}});
          // noteW: only weeks that differ from base
          var noteW={};
          for(var w=1;w<=settimane;w++){
            if(prescr[w]&&prescr[w]!==baseNote)noteW[w]=prescr[w];
          }
          var serie=parseNoteToSerie(baseNote);
          var exId='g'+currentGiorno.id+'e'+(currentGiorno.esercizi.length+1);
          currentGiorno.esercizi.push({id:exId,nome:titleCase(colB),note:baseNote,noteW:noteW,serie:serie});
        }
      });

      if(!giorni.length){alert('Nessun giorno trovato. Verifica il file.');return;}
      _saveScheda(schedaId,settimane,giorni,file.name);
    }catch(err){console.error(err);alert('Errore importazione: '+err.message);}
  };
  reader.readAsArrayBuffer(file);
}

function importSchedaDocx(file){
  if(typeof mammoth==='undefined'){alert('Libreria mammoth non caricata. Riprova con .xlsx');return;}
  var reader=new FileReader();
  reader.onload=function(e){
    mammoth.extractRawText({arrayBuffer:e.target.result}).then(function(result){
      try{
        var text=result.value;
        var lines=text.split(/\r?\n/).map(function(l){return l.trim();}).filter(Boolean);

        // Find number of weeks
        var settimane=7;
        var wm=text.match(/(\d+)\s*SETTIM/i);
        if(wm)settimane=parseInt(wm[1]);

        var fnMatch=file.name.match(/(\d{2,3})/);
        var schedaId=fnMatch?fnMatch[1]:String(Date.now()).slice(-4);
        while(SCHEDE[schedaId])schedaId=schedaId+'b';

        var giorni=[],currentGiorno=null;
        lines.forEach(function(line){
          // Day header
          if(/^GIORNO\s+\d/i.test(line)){
            var dayNum=parseInt(line.match(/\d+/)[0]);
            currentGiorno={id:dayNum,nome:'Giorno '+dayNum,colore:DAY_COLORS[(dayNum-1)%DAY_COLORS.length],esercizi:[]};
            giorni.push(currentGiorno);
            return;
          }
          // Exercise line: ALL CAPS, length > 5, not a number-only line
          if(currentGiorno&&line.length>5&&line===line.toUpperCase()&&/[A-Z]{3}/.test(line)&&!/^[\d\s\.\-\+\%X]+$/.test(line)&&!/^(KG|REPS|NOTE|SETTIMAN|RIPOSO|LIBERO|#|DURATA|BUON|ADDOME|SCELTA|PERCENTUALE|ATLETA|ALLENAMENTO|PIERFRANCESCO)/.test(line)){
            var baseNote='';
            var serie=parseNoteToSerie(baseNote);
            var exId='g'+currentGiorno.id+'e'+(currentGiorno.esercizi.length+1);
            currentGiorno.esercizi.push({id:exId,nome:titleCase(line),note:baseNote,noteW:{},serie:serie});
          }
        });

        if(!giorni.length){alert('Nessun esercizio trovato nel DOCX.');return;}
        _saveScheda(schedaId,settimane,giorni,file.name);
      }catch(err){console.error(err);alert('Errore lettura DOCX: '+err.message);}
    }).catch(function(err){alert('Errore parsing DOCX: '+err.message);});
  };
  reader.readAsArrayBuffer(file);
}

function _saveScheda(schedaId,settimane,giorni,fname){
  var scheda={id:schedaId,nome:'Scheda #'+schedaId,settimane:settimane,colore:'#FF6B35',icona:'💪',giorni:giorni};
  localStorage.setItem('pier_scheda_def_'+schedaId,JSON.stringify(scheda));
  SCHEDE[schedaId]=scheda;
  S.schedaId=schedaId;S.giorno=null;S.tab='home';S.showImport=false;
  // Push to cloud immediately so the new scheda is backed up
  if(getCloudMode()!=='none')cloudPush(false);
  render();
  var tot=giorni.reduce(function(a,g){return a+g.esercizi.length;},0);
  setTimeout(function(){alert('✅ Scheda #'+schedaId+' importata!\n'+giorni.length+' giorni · '+settimane+' settimane · '+tot+' esercizi');},300);
}

function titleCase(str){
  return str.toLowerCase().replace(/(?:^|\s|\(|°)\S/g, function(c){ return c.toUpperCase(); });
}

function parseNoteToSerie(note){
  if(!note) return [{kg:'',reps:'',done:false}];
  note = note.trim();
  var serie = [];
  // Match patterns like "3 X 7", "2 X 8", "2 X MAX10RM", "1 X MAX -20%"
  var parts = note.split(/\s+(?=\d+\s*X)/i);
  parts.forEach(function(part){
    var m = part.match(/(\d+)\s*[Xx]\s*(MAX\s*[-\d]*RM?|MAX\s*[-\d]*%?|\d+)/i);
    if(m){
      var count = parseInt(m[1]);
      var reps = m[2].replace(/\s+/g,'');
      // Normalize: ALL MAX variants → just "MAX". Details stay in note/noteW.
      if(/MAX/i.test(reps)) reps = 'MAX';
      for(var i=0;i<count;i++) serie.push({kg:'',reps:reps,done:false});
    }
  });
  if(!serie.length) serie.push({kg:'',reps:'',done:false});
  return serie;
}

// ─── DELETE SCHEDA ────────────────────────────────────────────────────────────
function deleteScheda(id){
  if(id==='25'||id==='26'){alert('La scheda #'+id+' non può essere eliminata.');return;}
  if(!confirm('Elimina Scheda #'+id+'? Verranno persi anche tutti i dati di allenamento salvati.'))return;
  localStorage.removeItem('pier_scheda_def_'+id);
  // Remove all session data for this scheda
  Object.keys(localStorage).filter(function(k){return k.indexOf('pier_s'+id+'_')===0;}).forEach(function(k){localStorage.removeItem(k);});
  delete SCHEDE[id];
  // Fallback alla scheda più recente disponibile
  var available=Object.keys(SCHEDE);
  S.schedaId=available.length?available[available.length-1]:'25';
  S.giorno=null;
  render();
}

  // Chart 2: Daily entries (ultimi 30)

    html+='</div></div>';
  }

  // Chart 4: Media settimanale ISO - ultime 6 settimane
  if(S.weightChart===3){
    var isoWeeks={};
    allDailyEntries.forEach(function(e){
      var d=new Date(e.date);

      for(var yi4=0;yi4<=3;yi4++){var yy4=Math.round(90/3*yi4);var yv4=Math.round((mx4-(yi4/3)*rng4)*10)/10;html+='<line x1="0" y1="'+yy4+'" x2="300" y2="'+yy4+'" stroke="#252530" stroke-width="1"/><text x="2" y="'+(yy4+8)+'" fill="#666680" font-size="8">'+yv4+'</text>';}

      pts4.forEach(function(p,i){

        var wlabel=last6[i].wk.replace(/\d{4}-/,'');
        html+='<text x="'+p[0]+'" y="101" fill="#666680" font-size="7" font-family="DM Sans,sans-serif" text-anchor="middle">'+wlabel+'</text>';
      });
      html+='</svg>';
      html+='<div style="margin-top:10px;border-top:1px solid var(--border2);padding-top:8px;">';
      html+='<table style="width:100%;border-collapse:collapse;font-size:11px;">';
      html+='<thead><tr style="color:var(--muted);">';
      html+='<th style="padding:4px 8px;font-weight:600;font-size:10px;text-align:left;">Settimana</th>';

      last6.forEach(function(row,i){

        html+='<tr style="border-top:1px solid var(--border2);'+(isLast?'background:rgba(255,208,96,.06);':'')+'">';
        html+='<td style="padding:6px 8px;color:'+(isLast?'#FFD060':'var(--text)')+';font-weight:'+(isLast?'700':'400')+';">'+row.wk.replace(/(\d{4})-W/,'W')+'<\/td>';
        html+='<td style="padding:6px 8px;text-align:right;font-family:Bebas Neue,sans-serif;font-size:14px;color:'+(isLast?'#FFD060':'var(--text)')+';">'+row.avg+' <span style="font-size:9px;font-family:DM Sans,sans-serif;color:var(--muted);">kg<\/span><\/td>';
        html+='<td style="padding:6px 8px;text-align:right;color:var(--muted2);">'+row.n+'<\/td>';
        html+='<td style="padding:6px 8px;text-align:right;font-weight:700;color:'+dCol+';">'+(delta===null?'\u2014':(delta>0?'+':'')+delta)+'<\/td>';
        html+='<\/tr>';
      });
      html+='<\/tbody><\/table><\/div>';
      html+='<\/div>';
    } else {
      html+='<div style="padding:24px 18px;text-align:center;color:var(--muted);font-size:13px;">Servono almeno 2 settimane di misurazioni.</div>';

  // ── DAILY HISTORY LIST ──────────────────────────────────────────────────
  if(allDailyEntries.length>0){

  html+='<div style="height:20px"></div>';


  return html;

// ─── EXERCISE PERFORMANCE LOOKUP ─────────────────────────────────────────────
function getExPerf(exName){
  var allKeys=LS.keys('pier_s').filter(function(k){return /pier_s\w+_g\d+_w\d+/.test(k);});
  var results={};
  allKeys.forEach(function(k){
    var m=k.match(/pier_s(\w+)_g(\d+)_w(\d+)/);if(!m)return;
    var sid=m[1],gid=parseInt(m[2]),wnum=parseInt(m[3]);
    var d=LS.get(k);if(!d||!d.esercizi)return;
    d.esercizi.forEach(function(ex){
      if(!ex.nome)return;
      var n1=ex.nome.toLowerCase().replace(/[^a-z0-9]/g,'');
      var n2=exName.toLowerCase().replace(/[^a-z0-9]/g,'');
      if(n1.indexOf(n2)<0&&n2.indexOf(n1)<0)return;
      if(!results[sid])results[sid]={nome:'Scheda #'+sid};
      if(!results[sid][gid])results[sid][gid]={};
      if(ex.serie&&ex.serie.length){
        results[sid][gid][wnum]={
          serie:ex.serie.filter(function(s){return s.kg||s.reps;}),
          nota:ex.nota||''
        };
      }
    });
  });
  return results;
}

function getBestKg(serie){
  if(!serie)return null;
  var nums=serie.map(function(s){return parseFloat(String(s.kg||'').replace(',','.'));}).filter(Boolean);
  return nums.length?Math.max.apply(null,nums):null;
}

// ─── ESERCIZI DATABASE ────────────────────────────────────────────────────────
function getAllExData(){
  var allSessions=LS.keys('pier_s').filter(function(k){return /pier_s\w+_g\d+_w\d+/.test(k);});
  var exMap={};
  allSessions.forEach(function(k){
    var m=k.match(/pier_s(\w+)_g(\d+)_w(\d+)/);
    if(!m)return;
    var sid=m[1],wnum=parseInt(m[3]);
    var d=LS.get(k);
    if(!d||!d.esercizi)return;
    var sc=SCHEDE[sid];
    var gObj=sc?sc.giorni.filter(function(g){return g.id===parseInt(m[2]);})[0]:null;
    d.esercizi.forEach(function(ex){
      if(!ex.nome||!ex.serie||!ex.serie.length)return;
      var bk=getBestKg(ex.serie);
      if(!bk)return;
      var nome=ex.nome;
      if(!exMap[nome])exMap[nome]=[];
      exMap[nome].push({sid:sid,schedaNome:sc?sc.nome:'Scheda #'+sid,giornoNome:gObj?gObj.nome:'G'+m[2],w:wnum,serie:ex.serie,bestKg:bk});
    });
  });
  return exMap;
}
function searchEx(exMap,q){
  if(!q||q.length<2)return [];
  var ql=q.toLowerCase();
  return Object.keys(exMap).filter(function(n){return n.toLowerCase().indexOf(ql)>=0;}).sort(function(a,b){
    var al=a.toLowerCase(),bl=b.toLowerCase();
    var as=al===ql?0:al.indexOf(ql)===0?1:2;
    var bs=bl===ql?0:bl.indexOf(ql)===0?1:2;
    return as-bs||a.localeCompare(b);
  });
}


function htmlEsc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

  });
  html+='</div>';

  html+='<div style="display:flex;flex-wrap:wrap;gap:8px;padding:0 18px 10px;">';
  sc.giorni.forEach(function(g){
    html+='<div style="display:flex;align-items:center;gap:4px;"><div style="width:8px;height:8px;border-radius:50%;background:'+g.colore+';flex-shrink:0;"></div><span style="font-size:10px;color:var(--muted);">G'+g.id+' '+g.nome+'</span></div>';
  });
  html+='</div>';

  var giorni=filterG==='all'?sc.giorni:sc.giorni.filter(function(g){return String(g.id)===String(filterG);});
  var nW=sc.settimane;

  giorni.forEach(function(g){
    html+='<div style="margin:0 18px 18px;">';
    // Giorno header
    html+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">';
    html+='<div style="width:10px;height:10px;border-radius:50%;background:'+g.colore+';flex-shrink:0;"></div>';
    html+='<div style="font-size:12px;font-weight:800;color:'+g.colore+';letter-spacing:.5px;">G'+g.id+' · '+g.nome+'</div>';
    html+='</div>';

    html+='<div style="background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden;">';

    // Tabella header: ESERCIZIO | W1..W7 | Δ
    html+='<div style="display:grid;grid-template-columns:1fr'+' 36px'.repeat(nW)+' 36px;background:var(--bg3);border-bottom:1px solid var(--border2);">';
    html+='<div style="padding:7px 10px;font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.5px;">ESERCIZIO</div>';
    for(var wi=1;wi<=nW;wi++){
      var hasSaved=false;
      g.esercizi.forEach(function(ex){var d=LS.get('pier_s'+sc.id+'_g'+g.id+'_w'+wi);if(d&&d.savedAt)hasSaved=true;});
      html+='<div style="padding:7px 0;font-size:9px;font-weight:700;color:'+(hasSaved?'var(--green)':'var(--muted)')+';text-align:center;letter-spacing:.3px;">W'+wi+'</div>';
    }
    html+='<div style="padding:7px 0;font-size:9px;font-weight:700;color:var(--yellow);text-align:center;">Δ</div>';
    html+='</div>';

    // Righe esercizi
    g.esercizi.forEach(function(ex,ei){
      // Recupera kg per ogni settimana
      var wKgs=[];
      for(var wi=1;wi<=nW;wi++){
        var log=LS.get('pier_s'+sc.id+'_g'+g.id+'_w'+wi);
        var kg=null;
        if(log&&log.esercizi){
          var exLog=log.esercizi.filter(function(e){return e.id===ex.id;})[0];
          if(exLog&&exLog.serie&&exLog.serie.length){
            // Prendi il primo kg non vuoto
            for(var si=0;si<exLog.serie.length;si++){
              var v=exLog.serie[si].kg;
              if(v!==null&&v!==undefined&&v!==''){kg=parseFloat(v)||v;break;}
            }
          }
        }
        wKgs.push(kg);
      }

      // Calcola Δ (primo vs ultimo non-null)
      var firstV=null,lastV=null;
      wKgs.forEach(function(v){if(v!==null&&!isNaN(parseFloat(v))){if(firstV===null)firstV=parseFloat(v);lastV=parseFloat(v);}});
      var delta=null;
      if(firstV!==null&&lastV!==null&&firstV!==lastV)delta=Math.round((lastV-firstV)*10)/10;

      var isEven=ei%2===0;
      html+='<div style="display:grid;grid-template-columns:1fr'+' 36px'.repeat(nW)+' 36px;border-top:1px solid var(--border2);background:'+(isEven?'transparent':'var(--bg3)20')+';align-items:center;">';

      // Nome esercizio
      html+='<div style="padding:8px 10px;font-size:11px;font-weight:600;color:var(--text);line-height:1.3;">'+htmlEsc(ex.nome)+'</div>';

      // Celle W1..W7
      for(var wi2=0;wi2<nW;wi2++){
        var v=wKgs[wi2];
        var isEmpty=v===null||v===undefined||v==='';
        var numV=isEmpty?null:parseFloat(v);
        // Colore: verde se aumentato vs settimana prima, rosso se calato
        var prevV=null;
        for(var pi=wi2-1;pi>=0;pi--){if(wKgs[pi]!==null&&!isNaN(parseFloat(wKgs[pi]))){prevV=parseFloat(wKgs[pi]);break;}}
        var cellCol='var(--muted2)';
        var bgCell='transparent';
        if(!isEmpty){
          cellCol='var(--text)';
          if(prevV!==null){
            if(numV>prevV){cellCol='var(--green)';bgCell='rgba(80,200,120,.08)';}
            else if(numV<prevV){cellCol='var(--red,#FF6B6B)';bgCell='rgba(255,107,107,.06)';}
          }
        }
        html+='<div style="padding:8px 2px;text-align:center;font-size:11px;font-weight:'+(isEmpty?'400':'700')+';color:'+cellCol+';background:'+bgCell+';">'+(isEmpty?'·':(Number.isInteger(numV)?String(numV):String(v)))+'</div>';
      }

      // Δ
      var deltaStr=delta===null?'·':((delta>0?'+':'')+delta);
      var deltaCol=delta===null?'var(--muted2)':delta>0?'var(--green)':'var(--red,#FF6B6B)';
      html+='<div style="padding:8px 2px;text-align:center;font-size:11px;font-weight:700;color:'+deltaCol+';">'+deltaStr+'</div>';

      html+='</div>';
    });

    html+='</div></div>';
  });

  html+='<div style="height:20px"></div>';
  return html;
}

      html+='</div>';

  // ── WORKOUT CALENDAR ─────────────────────────────────────────────────────

// ─── PR WALL ──────────────────────────────────────────────────────────────────
function buildPRWall(){
  var prs=getAllPRs();
  var names=Object.keys(prs).filter(function(n){return prs[n].bestKg>0;});
  names.sort(function(a,b){return prs[b].bestKg-prs[a].bestKg;});

  var html='<div style="padding:18px 18px 0;"><div class="eyebrow">Personal Records</div><div class="big-title" style="font-size:42px;">🏆 <span style="color:var(--accent)">HALL</span> OF PR</div></div>';
  // Search bar
  html+='<div style="padding:12px 18px 0;"><div style="display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--border);border-radius:13px;padding:10px 14px;"><span style="font-size:16px;">🔍</span><input id="pr-search" type="text" placeholder="Cerca esercizio... (es. leg extension)" value="'+htmlEsc(S.prSearch||'')+'" style="flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:14px;font-family:DM Sans,sans-serif;"/>'+(S.prSearch?'<button id="pr-search-clear" style="background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;">✕</button>':'')+' </div></div>';
  // Search results
  if(S.prSearch&&S.prSearch.length>=2){
    var srQuery=S.prSearch.trim();
    var allKeys2=LS.keys('pier_s').filter(function(k){return /pier_s\w+_g\d+_w\d+/.test(k);});
    var srResults={};
    allKeys2.forEach(function(k){
      var m2=k.match(/pier_s(\w+)_g(\d+)_w(\d+)/);if(!m2)return;
      var sid2=m2[1],gid2=parseInt(m2[2]),wnum2=parseInt(m2[3]);
      var d2=LS.get(k);if(!d2||!d2.esercizi||!d2.savedAt)return;
      d2.esercizi.forEach(function(ex2){
        if(!ex2.nome)return;
        var n1=ex2.nome.toLowerCase().replace(/[^a-z0-9]/g,'');
        var n2=srQuery.toLowerCase().replace(/[^a-z0-9]/g,'');
        if(n1.indexOf(n2)<0&&n2.indexOf(n1)<0)return;
        var exKey=ex2.nome;
        if(!srResults[exKey])srResults[exKey]={nome:ex2.nome,weeks:[]};
        var doneSerie=(ex2.serie||[]).filter(function(s){return s.done&&(s.kg||s.reps);});
        if(doneSerie.length){
          var topKg2=null;doneSerie.forEach(function(s){var kv=parseFloat(String(s.kg||'').replace(',','.'));if(!isNaN(kv)&&kv>0&&(topKg2===null||kv>topKg2))topKg2=kv;});
          var rTot=0,rCnt=0;doneSerie.forEach(function(s){var rv=parseInt(s.reps||'');if(!isNaN(rv)&&rv>0){rTot+=rv;rCnt++;}});
          var avgR2=rCnt>0?Math.round(rTot/rCnt*10)/10:null;
          srResults[exKey].weeks.push({sid:sid2,gid:gid2,w:wnum2,topKg:topKg2,avgReps:avgR2,doneSerie:doneSerie});
        }
      });
    });
    var srNames=Object.keys(srResults);
    if(srNames.length===0){
      html+='<div style="padding:24px 18px;text-align:center;color:var(--muted);font-size:13px;">Nessun risultato per "'+htmlEsc(srQuery)+'"</div>';
    } else {
      html+='<div style="padding:12px 18px 0;">';
      srNames.forEach(function(name){
        var sr=srResults[name];
        var allKgs=sr.weeks.map(function(w){return w.topKg;}).filter(Boolean);
        var bestKgSr=allKgs.length?Math.max.apply(null,allKgs):null;
        html+='<div style="background:var(--bg2);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;">';
        html+='<div style="padding:12px 14px;border-bottom:1px solid var(--border2);display:flex;align-items:center;gap:10px;">';
        html+='<span style="font-size:16px;">💪</span>';
        html+='<div style="flex:1;"><div style="font-size:14px;font-weight:700;">'+htmlEsc(name)+'</div>';
        if(bestKgSr)html+='<div style="font-size:11px;color:var(--accent);margin-top:1px;">Best: '+bestKgSr+' kg</div>';
        html+='</div></div>';
        // Week rows
        sr.weeks.sort(function(a,b){return a.w-b.w;});
        sr.weeks.forEach(function(wk){
          var sc3=SCHEDE[wk.sid];
          var scName=sc3?sc3.nome:'#'+wk.sid;
          // Build kg/reps string
          var kgGroups3={};
          wk.doneSerie.forEach(function(s){
            var kg=s.kg||'?';
            if(!kgGroups3[kg])kgGroups3[kg]=[];
            if(s.reps)kgGroups3[kg].push(s.reps);
          });
          var kgStr=Object.keys(kgGroups3).map(parseFloat).filter(Boolean).sort(function(a,b){return b-a;}).map(function(kg){
            var reps=kgGroups3[String(kg)]||kgGroups3[kg]||[];
            return kg+'kg '+reps.join(' ');
          }).join(' | ');
          html+='<div style="display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--border2);">';
          html+='<span style="font-family:Bebas Neue,sans-serif;font-size:12px;color:var(--muted2);min-width:30px;">W'+wk.w+'</span>';
          html+='<span style="font-size:11px;color:var(--muted);flex:1;">'+kgStr+'</span>';
          html+='<span style="font-size:10px;color:var(--muted2);">'+scName+'</span>';
          html+='</div>';
        });
        html+='</div>';
      });
      html+='</div>';
    }
    return html;
  }

  if(!names.length){
    html+='<div class="empty" style="margin-top:40px;"><div class="empty-icon">🏆</div>';
    html+='<div style="font-size:14px;font-weight:600;">Nessun PR ancora</div>';
    html+='<div style="font-size:12px;color:var(--muted);">Salva le settimane per vedere i tuoi record</div></div>';
    return html;
  }

  // Stats summary
  var topKg=names.length?prs[names[0]].bestKg:0;
  var totalPR=names.length;
  var avgBest=names.length?Math.round(names.reduce(function(a,n){return a+prs[n].bestKg;},0)/names.length*10)/10:0;
  html+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:12px 18px 0;">';
  html+='<div class="dash-card" style="text-align:center;padding:12px;"><div style="font-family:Bebas Neue,sans-serif;font-size:28px;color:var(--accent);">'+topKg+'</div><div style="font-size:9px;color:var(--muted);margin-top:2px;">MAX KG</div></div>';
  html+='<div class="dash-card" style="text-align:center;padding:12px;"><div style="font-family:Bebas Neue,sans-serif;font-size:28px;color:var(--green);">'+totalPR+'</div><div style="font-size:9px;color:var(--muted);margin-top:2px;">ESERCIZI</div></div>';
  html+='<div class="dash-card" style="text-align:center;padding:12px;"><div style="font-family:Bebas Neue,sans-serif;font-size:28px;color:#C77DFF;">'+avgBest+'</div><div style="font-size:9px;color:var(--muted);margin-top:2px;">KG MEDIO</div></div>';
  html+='</div>';

  // Muscle filter
  var muscles={};names.forEach(function(n){var m=prs[n].muscle||'Altro';if(!muscles[m])muscles[m]=0;muscles[m]++;});
  var mKeys=Object.keys(muscles).sort(function(a,b){return muscles[b]-muscles[a];});
  html+='<div style="display:flex;gap:6px;padding:10px 18px 0;overflow-x:auto;-webkit-overflow-scrolling:touch;">';
  html+='<div class="m-tab'+(S.prFilter===''?' active':'')+'" data-prfilter="">Tutti ('+names.length+')</div>';
  mKeys.forEach(function(m){
    var mc=MUSCOLI_COLORS[m]||'var(--muted)';
    html+='<div class="m-tab'+(S.prFilter===m?' active':'')+'" data-prfilter="'+htmlEsc(m)+'" style="'+(S.prFilter===m?'background:'+mc+';border-color:'+mc:'')+'">'+m+' ('+muscles[m]+')</div>';
  });

function renderEntriesTable(entries, bestKgAll){
  var t='<table style="width:100%;border-collapse:collapse;font-size:12px;">';
  t+='<tr style="background:var(--bg3);">';
  t+='<th style="padding:7px 10px;text-align:left;color:var(--muted);font-weight:600;font-size:10px;">SETT.</th>';
  t+='<th style="padding:7px 10px;text-align:center;color:var(--muted);font-weight:600;font-size:10px;">KG</th>';
  t+='<th style="padding:7px 10px;text-align:left;color:var(--muted);font-weight:600;font-size:10px;">SERIE</th>';
  if(S.exTab===0)t+='<th style="padding:7px 10px;text-align:left;color:var(--muted);font-weight:600;font-size:10px;">SCHEDA</th>';
  t+='</tr>';
  entries.forEach(function(entry){
    var groups=[];
    entry.serie.forEach(function(s){
      if(!s.kg&&!s.reps)return;
      var kg=s.kg||'?';
      if(!groups.length||groups[groups.length-1].kg!==kg)groups.push({kg:kg,reps:[]});
      if(s.reps)groups[groups.length-1].reps.push(s.reps);
    });
    var serieStr=groups.map(function(g){
      return(g.reps.length?g.reps.length+'x('+g.reps.join(' ')+')@'+g.kg+'kg':'@'+g.kg+'kg');
    }).join(' › ');
    if(!serieStr)serieStr='—';
    var isMax=entry.bestKg===bestKgAll;
    t+='<tr style="border-top:1px solid var(--border2);'+(isMax?'background:rgba(255,107,53,.06);':'')+'">';
    t+='<td style="padding:8px 10px;font-weight:700;">W'+entry.w+'</td>';
    t+='<td style="padding:8px 10px;text-align:center;"><span style="font-family:Bebas Neue,sans-serif;font-size:18px;color:'+(isMax?'var(--accent)':'var(--text)')+';">'+entry.bestKg+'</span>'+(isMax?'<span style="color:var(--accent);font-size:9px;"> ★</span>':'')+'</td>';
    t+='<td style="padding:8px 10px;color:var(--muted);font-size:11px;">'+htmlEsc(serieStr)+'</td>';
    if(S.exTab===0)t+='<td style="padding:8px 10px;font-size:11px;color:var(--muted);">'+htmlEsc(entry.schedaNome)+'</td>';
    t+='</tr>';
  });
  t+='</table>';
  return t;
}

function buildExResultsHTML(q){
  var exMap=getAllExData();
  var q2=(q||'').trim();
  var results=searchEx(exMap,q2);
  q=q2;
  var html='<div style="padding:10px 18px;">';

if(!q){
  var totalEx=Object.keys(exMap).length;
  if(totalEx===0){
    html+='<div class="empty" style="margin-top:40px;"><div class="empty-icon">&#127947;</div>';
    html+='<div style="font-size:14px;font-weight:600;">Nessun dato ancora</div>';
    html+='<div style="font-size:12px;color:var(--muted);margin-top:4px;">Salva le settimane per cercare i record</div></div>';
  } else {
    var topNames=Object.keys(exMap).map(function(n){
      var bk=Math.max.apply(null,exMap[n].map(function(e){return e.bestKg||0;}));
      return{n:n,kg:bk};
    }).filter(function(x){return x.kg>0;}).sort(function(a,b){return b.kg-a.kg;}).slice(0,6);
    html+='<div style="font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;">'+totalEx+' esercizi nel log</div>';
    topNames.forEach(function(x){
      html+='<button data-exsuggest="'+htmlEsc(x.n)+'" style="display:flex;align-items:center;gap:12px;width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;text-align:left;font-family:DM Sans,sans-serif;">';
      html+='<div style="font-family:Bebas Neue,sans-serif;font-size:22px;color:var(--accent);min-width:52px;text-align:right;">'+x.kg+' <span style="font-size:10px;color:var(--muted);font-family:DM Sans,sans-serif;">kg</span></div>';
      html+='<div style="font-size:13px;font-weight:600;color:var(--text);flex:1;">'+htmlEsc(x.n)+'</div>';
      html+='<div style="color:var(--muted);font-size:16px;">&#8250;</div>';
      html+='</button>';
    });
  }
} else if(!results.length){
  html+='<div class="empty" style="margin-top:32px;"><div class="empty-icon">&#129335;</div>';
  html+='<div style="font-size:14px;font-weight:600;">Nessun esercizio trovato</div>';
  html+='<div style="font-size:12px;color:var(--muted);margin-top:4px;">'+htmlEsc(q)+' non trovato nei dati salvati</div></div>';
} else {
  results.forEach(function(nome){
    var entries=exMap[nome];
    entries.sort(function(a,b){return a.sid>b.sid?1:a.sid<b.sid?-1:a.w-b.w;});
    var bestKgAll=Math.max.apply(null,entries.map(function(e){return e.bestKg||0;}));

    html+='<div style="background:var(--bg2);border:1px solid var(--border);border-radius:16px;margin-bottom:16px;overflow:hidden;">';

    if(S.exTab===0){
      // ── TIMELINE: tutti i dati in una tabella continua ──
      var firstKg=entries[0]?entries[0].bestKg:null;
      var delta=(bestKgAll&&firstKg)?bestKgAll-firstKg:null;
      html+='<div style="padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;">';
      html+='<div style="flex:1;">';
      html+='<div style="font-size:15px;font-weight:700;">'+htmlEsc(nome)+'</div>';
      if(delta!==null){var dCol=delta>0?'var(--green)':delta<0?'var(--red)':'var(--muted)';html+='<div style="font-size:11px;color:'+dCol+';margin-top:3px;font-weight:600;">'+(delta>0?'▲ +':delta<0?'▼ ':'→ ')+Math.abs(delta).toFixed(1)+' kg · W1→W'+entries[entries.length-1].w+'</div>';}
      html+='</div>';
      html+='<div style="text-align:center;background:var(--accent);border-radius:10px;padding:6px 14px;"><div style="font-family:Bebas Neue,sans-serif;font-size:28px;line-height:1;color:#fff;">'+bestKgAll+'</div><div style="font-size:8px;color:rgba(255,255,255,.75);letter-spacing:1px;">MAX KG</div></div>';
      html+='</div>';
      html+=renderEntriesTable(entries, bestKgAll);

    } else {
      // ── PER SCHEDA: sezioni separate per ogni scheda ──
      html+='<div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;">';
      html+='<div style="font-size:15px;font-weight:700;flex:1;">'+htmlEsc(nome)+'</div>';
      html+='<div style="text-align:center;background:var(--accent);border-radius:10px;padding:4px 12px;"><div style="font-family:Bebas Neue,sans-serif;font-size:22px;line-height:1;color:#fff;">'+bestKgAll+'</div><div style="font-size:8px;color:rgba(255,255,255,.75);">MAX KG</div></div>';
      html+='</div>';
      // Group by schedaId
      var schedeIds={};
      entries.forEach(function(e){if(!schedeIds[e.sid])schedeIds[e.sid]=[];schedeIds[e.sid].push(e);});
      Object.keys(schedeIds).sort().forEach(function(sid){
        var schEntries=schedeIds[sid];
        var schBest=Math.max.apply(null,schEntries.map(function(e){return e.bestKg||0;}));
        var schFirst=schEntries[0]?schEntries[0].bestKg:null;
        var schDelta=schBest&&schFirst?schBest-schFirst:null;
        html+='<div style="padding:8px 14px;background:rgba(255,107,53,.04);border-bottom:1px solid var(--border2);display:flex;align-items:center;gap:8px;">';
        html+='<span style="font-size:10px;color:var(--accent);font-weight:700;letter-spacing:1px;">'+htmlEsc(schEntries[0].schedaNome.toUpperCase())+'</span>';
        if(schDelta!==null)html+='<span style="font-size:10px;color:'+(schDelta>0?'var(--green)':schDelta<0?'var(--red)':'var(--muted)')+';font-weight:600;">'+(schDelta>0?'▲+':schDelta<0?'▼':'')+Math.abs(schDelta).toFixed(1)+'kg</span>';
        html+='<span style="margin-left:auto;font-family:Bebas Neue,sans-serif;font-size:16px;color:var(--accent);">'+schBest+'kg</span>';
        html+='</div>';
        html+=renderEntriesTable(schEntries, schBest);
      });
    }
    html+='</div>';
  });
}

html+='</div>';
  html+='</div>';
  return html;
}

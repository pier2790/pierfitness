// ─── SCHEDA COMPLETA ──────────────────────────────────────────────────────────
function buildSchedaCompleta(){
  var sc=SCHEDE[S.schedaId];if(!sc)return '<div class="empty"><div>Nessuna scheda</div></div>';
  var html='<div style="padding:18px 18px 0;"><div class="eyebrow">Scheda #'+sc.id+'</div><div class="big-title" style="font-size:36px;">📊 '+sc.nome+'</div></div>';

  // Giorno filter tabs
  html+='<div style="display:flex;gap:6px;padding:10px 18px 0;overflow-x:auto;-webkit-overflow-scrolling:touch;">';
  html+='<div class="filter-tab'+(S.schedaDay===0?' active':'')+'" data-schedaday="0">Tutti</div>';
  sc.giorni.forEach(function(g){
    html+='<div class="filter-tab'+(S.schedaDay===g.id?' active':'')+'" data-schedaday="'+g.id+'" style="'+(S.schedaDay===g.id?'border-color:'+g.colore+';color:'+g.colore:'')+'">'+'G'+g.id+'</div>';
  });
  html+='</div>';

  var giorni=S.schedaDay===0?sc.giorni:sc.giorni.filter(function(g){return g.id===S.schedaDay;});

  giorni.forEach(function(g){
    html+='<div style="margin:12px 18px 0;">';
    html+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:7px 12px;background:'+g.colore+'15;border-radius:9px;border-left:3px solid '+g.colore+';">';
    html+='<div style="font-size:11px;color:'+g.colore+';font-weight:800;letter-spacing:2px;">G'+g.id+'</div>';
    html+='<div style="font-size:11px;color:var(--muted);">'+g.nome+'</div>';
    html+='</div>';

    g.esercizi.forEach(function(ex,exIdx){
      // Raccogli dati di tutte le settimane
      var weekData={};
      for(var w=1;w<=sc.settimane;w++){
        var d=LS.get('pier_s'+S.schedaId+'_g'+g.id+'_w'+w);
        if(!d)continue;
        var exLog=d.esercizi?d.esercizi.filter(function(e2){return e2.id===ex.id;})[0]:null;
        if(exLog&&exLog.serie&&exLog.serie.length){
          weekData[w]={serie:exLog.serie,nota:exLog.nota||'',savedAt:d.savedAt||null};
        }
      }
      var hasData=Object.keys(weekData).length>0;

      html+='<div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden;">';

      // HEADER: nome + prescrizione
      html+='<div style="padding:10px 14px 8px;display:flex;align-items:flex-start;gap:9px;">';
      html+='<div style="min-width:20px;height:20px;border-radius:50%;background:'+g.colore+'20;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:'+g.colore+';margin-top:2px;flex-shrink:0;">'+(exIdx+1)+'</div>';
      html+='<div style="flex:1;">';
      html+='<div style="font-size:13px;font-weight:700;">'+htmlEsc(ex.nome)+'</div>';
      if(ex.note){
        html+='<div style="margin-top:4px;"><span style="font-family:Bebas Neue,sans-serif;font-size:18px;letter-spacing:.5px;color:'+g.colore+';">'+htmlEsc(ex.note)+'</span></div>';
      }
      if(ex.noteW&&Object.keys(ex.noteW).length){
        html+='<div style="margin-top:4px;display:flex;flex-wrap:wrap;gap:3px;">';
        Object.keys(ex.noteW).sort(function(a,b){return parseInt(a)-parseInt(b);}).forEach(function(ww){
          html+='<span style="font-size:10px;padding:2px 6px;border-radius:5px;background:rgba(255,208,96,.15);color:var(--yellow);font-weight:700;">⚠️ W'+ww+': '+htmlEsc(ex.noteW[ww])+'</span>';
        });
        html+='</div>';
      }
      html+='</div>';
      html+='</div>';

      // RIGHE SETTIMANE - sempre visibili
      html+='<div style="border-top:1px solid var(--border2);">';
      if(!hasData){
        html+='<div style="padding:8px 14px;font-size:11px;color:var(--muted2);">—</div>';
      } else {
        var prevKgKey='';
        var prevReps='';
        var weeks=Object.keys(weekData).map(Number).sort(function(a,b){return a-b;});
        weeks.forEach(function(w){
          var wd=weekData[w];
          var isActive=(w===S.activeWeek);
          var isSaved=!!(wd.savedAt);

          // Estrai kg unici (ordinati desc) e tutte le reps
          var kgList=[],repsArr=[];
          wd.serie.forEach(function(s){
            var kg=s.kg||'';
            if(kg&&kgList.indexOf(parseFloat(kg))===-1)kgList.push(parseFloat(kg));
            if(s.reps)repsArr.push(s.reps);
          });
          kgList.sort(function(a,b){return b-a;});
          var kgKey=kgList.join('-');
          var repsStr=repsArr.join(' ');

          var kgChanged=prevKgKey!==''&&kgKey!==prevKgKey;
          var kgUp=kgChanged&&kgList[0]>(parseFloat(prevKgKey.split('-')[0])||0);
          var repsChanged=prevReps!==''&&repsStr!==prevReps&&!kgChanged;

          html+='<div style="display:flex;align-items:baseline;gap:8px;padding:6px 14px;'+(isActive?'background:rgba(255,107,53,.06);':kgChanged?'background:'+(kgUp?'rgba(61,219,122,.04)':'rgba(255,77,106,.04)')+';':'')+'">';

          // W badge
          html+='<div style="min-width:22px;font-family:Bebas Neue,sans-serif;font-size:13px;flex-shrink:0;color:'+(isActive?'var(--accent)':isSaved?'var(--green)':'var(--muted2)')+';">W'+w+'</div>';

          // KG
          if(kgList.length===1){
            html+='<span style="font-family:Bebas Neue,sans-serif;font-size:20px;color:'+(kgChanged?(kgUp?'var(--green)':'var(--red)'):'var(--text)')+';">'+kgList[0]+'<span style="font-family:DM Sans,sans-serif;font-size:10px;color:var(--muted);"> kg</span></span>';
          } else {
            kgList.forEach(function(kg,ki){
              if(ki>0)html+='<span style="font-size:10px;color:var(--muted2);">·</span>';
              html+='<span style="font-family:Bebas Neue,sans-serif;font-size:'+(ki===0?'20':'16')+'px;color:'+(kgChanged&&ki===0?(kgUp?'var(--green)':'var(--red)'):'var(--muted)')+';">'+kg+'<span style="font-family:DM Sans,sans-serif;font-size:9px;color:var(--muted);">kg</span></span>';
            });
          }

          // Reps
          html+='<span style="font-size:14px;font-weight:'+(repsChanged?'700':'400')+';color:'+(repsChanged?'var(--accent)':'var(--muted)')+'">'+((repsStr||'—')+'</span>');

          // Delta KG
          if(kgChanged){
            var delta=Math.abs(kgList[0]-(parseFloat(prevKgKey.split('-')[0])||0));
            html+='<span style="font-size:10px;font-weight:700;color:'+(kgUp?'var(--green)':'var(--red)')+'">'+(kgUp?'+':'-')+delta+'</span>';
          }

          // Nota
          if(wd.nota){
            html+='<span style="font-size:10px;color:var(--muted);font-style:italic;margin-left:4px;">💬</span>';
          }

          html+='</div>';
          prevKgKey=kgKey;
          prevReps=repsStr;
        });
      }
      html+='</div>'; // righe settimane
      html+='</div>'; // card
    });
    html+='</div>'; // giorno
  });

  html+='<div style="height:20px"></div>';
  return html;
}

// ─── PDF COACH EXPORT ─────────────────────────────────────────────────────────
function exportPDFCoach(mode){
  try{
  var sc=SCHEDE[S.schedaId];if(!sc)return;
  var giorni=mode==='scheda'?(S.schedaDay===0?sc.giorni:sc.giorni.filter(function(g){return g.id===S.schedaDay;})):sc.giorni;
  var W=sc.settimane;

  // Build printable HTML
  var css='body{font-family:Arial,sans-serif;margin:20px;color:#111;font-size:11px;}'+
    'h1{font-size:20px;margin:0 0 4px;}'+
    'h2{font-size:14px;margin:16px 0 6px;border-bottom:2px solid #FF6B35;padding-bottom:4px;color:#FF6B35;}'+
    'table{width:100%;border-collapse:collapse;margin-bottom:10px;page-break-inside:avoid;}'+
    'th{background:#222;color:#fff;padding:4px 6px;font-size:10px;text-align:center;}'+
    'td{padding:3px 6px;text-align:center;font-size:10px;border-bottom:1px solid #eee;}'+
    'td:first-child{text-align:left;font-weight:600;max-width:180px;}'+
    '.up{color:#27ae60;font-weight:700;}.dn{color:#e74c3c;font-weight:700;}.cur{background:#fff8f0;}'+
    '@media print{@page{margin:10mm;size:A4 portrait;}}';

  var body='<h1>Scheda #'+sc.id+' – Report Coach</h1>'+
    '<div style="font-size:10px;color:#666;margin-bottom:12px;">Generato: '+new Date().toLocaleDateString('it-IT',{day:'2-digit',month:'long',year:'numeric'})+' | Settimana attiva: W'+S.activeWeek+'/'+W+'</div>';

  giorni.forEach(function(g){
    body+='<h2>G'+g.id+' – '+g.nome+'</h2>';
    g.esercizi.forEach(function(ex){
      body+='<table><tr><th style="text-align:left;background:#444;">'+ex.nome+'</th>';
      for(var w=1;w<=W;w++){
        var d=LS.get('pier_s'+S.schedaId+'_g'+g.id+'_w'+w);
        var saved=d&&d.savedAt;
        body+='<th class="'+(w===S.activeWeek?'cur':'')+(saved?'':' style="color:#aaa"')+'">W'+w+'</th>';
      }
      body+='</tr>';

      // KG row
      body+='<tr><td>⚖️ Kg (set 1)</td>';
      var prevKg=null;
      for(var w=1;w<=W;w++){
        var dPdf=LS.get('pier_s'+S.schedaId+'_g'+g.id+'_w'+w);
        var exLogPdf=dPdf&&dPdf.esercizi?dPdf.esercizi.filter(function(e2){return e2.id===ex.id;})[0]:null;
        var kg=exLogPdf&&exLogPdf.serie&&exLogPdf.serie.length?exLogPdf.serie[0].kg:'';
        var kgN=parseFloat(kg)||0;
        var cls=kgN>0&&prevKg!=null?(kgN>prevKg?'up':kgN<prevKg?'dn':''):'';
        body+='<td class="'+cls+(w===S.activeWeek?' cur':'')+'">'+
          (kg?(kgN>0&&prevKg!=null&&kgN!==prevKg?kg+(kgN>prevKg?' ↑':' ↓'):kg):'–')+'</td>';
        if(kgN>0)prevKg=kgN;
      }
      body+='</tr>';

      // REPS row
      body+='<tr><td>🔁 Reps</td>';
      for(var w=1;w<=W;w++){
        var dPdf2=LS.get('pier_s'+S.schedaId+'_g'+g.id+'_w'+w);
        var exLogPdf2=dPdf2&&dPdf2.esercizi?dPdf2.esercizi.filter(function(e2){return e2.id===ex.id;})[0]:null;
        var reps=exLogPdf2&&exLogPdf2.serie?exLogPdf2.serie.map(function(s){return s.reps;}).filter(Boolean).join(' / '):'';
        body+='<td class="'+(w===S.activeWeek?'cur':'')+'">'+( reps||'–')+'</td>';
      }
      body+='</tr></table>';
    });
  });

  // Add weight summary
  var wh=getWeightHistory();
  if(wh.length){
    body+='<h2>⚖️ Andamento Peso</h2><table><tr><th>Settimana</th><th>Media</th><th>Δ</th><th>Min</th><th>Max</th></tr>';
    wh.forEach(function(wk,i){
      var prev=i>0?wh[i-1].avg:null;
      var dlt=prev?(wk.avg-prev).toFixed(1):'–';
      var dltCls=prev?(parseFloat(dlt)>0?'dn':parseFloat(dlt)<0?'up':''):'';
      var vals=wk.days.filter(Boolean);
      var mn=vals.length?Math.min.apply(null,vals).toFixed(1):'–';
      var mx=vals.length?Math.max.apply(null,vals).toFixed(1):'–';
      body+='<tr><td>'+wk.wk+'</td><td style="font-weight:700;">'+(wk.avg?wk.avg.toFixed(2):'–')+'</td>'+
        '<td class="'+dltCls+'">'+(prev?(parseFloat(dlt)>0?'↑':parseFloat(dlt)<0?'↓':'→')+Math.abs(dlt):'–')+'</td>'+
        '<td>'+mn+'</td><td>'+mx+'</td></tr>';
    });
    body+='</table>';
  }

  var win=window.open('','_blank');
  if(!win){alert('Abilita i popup per esportare PDF');return;}
  win.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Report Scheda #'+sc.id+'</title><style>'+css+'</style></head><body>'+body+'<script>window.onload=function(){window.print();}<\/script></body></html>');
  win.document.close();
  }catch(err){alert('Errore generazione PDF: '+err.message);console.error(err);}
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function renderModal(){
  var m=document.getElementById('modal');if(!m)return;
  try{
  var html='';
  // SCHEDA PICKER
  if(S.showSchedaPicker){
    html+='<div class="overlay-bottom" id="sp-overlay"><div class="sheet"><div class="sheet-handle"></div>';
    html+='<div style="font-family:Bebas Neue,sans-serif;font-size:20px;letter-spacing:1px;margin-bottom:16px;">Scegli Scheda</div>';
    Object.values(SCHEDE).forEach(function(sc){
      var isA=S.schedaId===sc.id;
      html+='<div class="scheda-picker-item'+(isA?' active-scheda':'')+'" data-pickscheda="'+sc.id+'">';
      html+='<span style="font-size:28px;">'+sc.icona+'</span>';
      html+='<div style="flex:1"><div style="font-size:16px;font-weight:600;">'+sc.nome+'</div><div style="font-size:11px;color:var(--muted);margin-top:2px;">'+sc.settimane+' settimane · '+sc.giorni.length+' giorni</div></div>';
      if(isA)html+='<span style="color:var(--accent);font-weight:700;font-size:18px;">✓</span>';
      html+='</div>';
    });
    html+='</div></div>';
    m.innerHTML=html;return;
  }
  // EXERCISE DETAIL
  if(S.exDetail){
    var exName=S.exDetail;
    var perf=getExPerf(exName);
    var schedaIds=Object.keys(perf).sort().reverse();
    var exFromDB=ESERCIZI_DB.filter(function(e){return e.n===exName;})[0];
    var mc=exFromDB?MUSCOLI_COLORS[exFromDB.m]||'var(--accent)':'var(--accent)';
    html+='<div class="perf-wrap" id="exdetail-overlay"><div class="perf-sheet"><div class="perf-handle"></div>';
    html+='<div class="perf-hdr"><div class="perf-ttl">'+exName+'</div><button class="perf-x" id="exdetail-close">✕</button></div>';
    if(exFromDB){
      html+='<div style="display:flex;gap:6px;align-items:center;margin-bottom:14px;">';
      html+='<span style="font-size:20px;">'+exFromDB.t+'</span>';
      html+='<span style="font-size:11px;padding:3px 9px;border-radius:20px;background:'+mc+'20;color:'+mc+';font-weight:600;">'+exFromDB.m+'</span>';
      html+='<span style="font-size:11px;color:var(--muted);">'+exFromDB.s+'</span>';
      html+='</div>';
    }
    if(!schedaIds.length){
      html+='<div style="text-align:center;padding:24px;color:var(--muted);font-size:13px;">Nessun dato registrato.<br><span style="font-size:11px;">Inizia ad allenarti con questo esercizio!</span></div>';
    }else{
      // For each scheda that has data
      schedaIds.forEach(function(sid){
        var sc=SCHEDE[sid];
        var sName=sc?sc.nome:'Scheda #'+sid;
        var sCol=sc?sc.colore:'var(--accent)';
        html+='<div style="margin-bottom:16px;">';
        html+='<div style="font-size:10px;color:'+sCol+';font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px;">';
        html+='<div style="width:3px;height:12px;border-radius:2px;background:'+sCol+'"></div>'+sName;
        html+='</div>';
        // Get all week data for this scheda
        var allW={};
        Object.keys(perf[sid]).forEach(function(gid){
          if(gid==='nome')return;
          Object.keys(perf[sid][gid]).forEach(function(w){
            if(!allW[w]||getBestKg(perf[sid][gid][w].serie)>getBestKg(allW[w].serie)){
              allW[w]=perf[sid][gid][w];
            }
          });
        });
        var weeks=Object.keys(allW).sort(function(a,b){return parseInt(a)-parseInt(b);});
        
        // Best performance
        var allBest=weeks.map(function(w){return getBestKg(allW[w].serie);}).filter(Boolean);
        var bestEver=allBest.length?Math.max.apply(null,allBest):null;
        var worstEver=allBest.length?Math.min.apply(null,allBest):null;
        if(bestEver){
          html+='<div style="display:flex;gap:8px;margin-bottom:10px;">';
          html+='<div style="flex:1;background:rgba(61,219,122,.08);border:1px solid rgba(61,219,122,.2);border-radius:10px;padding:10px;text-align:center;">';
          html+='<div style="font-family:Bebas Neue,sans-serif;font-size:28px;color:var(--green);">'+bestEver+'</div>';
          html+='<div style="font-size:9px;color:var(--muted);">KG MASSIMO</div></div>';
          var totalInc=allBest.length>1?Math.round((allBest[allBest.length-1]-allBest[0])*10)/10:null;
          html+='<div style="flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center;">';
          html+='<div style="font-family:Bebas Neue,sans-serif;font-size:28px;color:'+(totalInc>0?'var(--green)':totalInc<0?'var(--red)':'var(--muted)')+'">'+(totalInc!==null?(totalInc>0?'+':'')+totalInc:'—')+'</div>';
          html+='<div style="font-size:9px;color:var(--muted);">Δ W1→W'+weeks[weeks.length-1]+'</div></div>';
          // 1RM estimation
          var best1rm=null;
          weeks.forEach(function(ww){var orm=getBest1RM(allW[ww].serie);if(orm&&(!best1rm||orm>best1rm))best1rm=orm;});
          if(best1rm){
            html+='<div style="flex:1;background:rgba(199,125,255,.08);border:1px solid rgba(199,125,255,.2);border-radius:10px;padding:10px;text-align:center;">';
            html+='<div style="font-family:Bebas Neue,sans-serif;font-size:28px;color:#C77DFF;">≈'+best1rm+'</div>';
            html+='<div style="font-size:9px;color:var(--muted);">1RM STIMATO</div></div>';
          }
          html+='</div>';
        }
        
        // ── PROGRESSION GRAPH for this scheda ──
        if(allBest.length>=2){
          var exgMin=Math.min.apply(null,allBest)-1;
          var exgMax=Math.max.apply(null,allBest)+1;
          var exgRng=exgMax-exgMin||1;
          var exgW=280,exgH=80;
          var exgPts=allBest.map(function(kg2,i2){
            return{x:20+i2/(allBest.length-1)*(exgW-40),y:exgH-8-((kg2-exgMin)/exgRng)*(exgH-20),kg:kg2,w:weeks[i2]};
          });
          var exgPoly=exgPts.map(function(p){return p.x+','+p.y;}).join(' ');
          html+='<div style="margin:8px 0 12px;padding:10px 14px;background:var(--bg3);border-radius:10px;">';
          html+='<div style="font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:6px;">📈 KG NEL TEMPO</div>';
          html+='<svg width="100%" viewBox="0 0 '+exgW+' '+(exgH+12)+'" preserveAspectRatio="xMidYMid meet" style="display:block;">';
          html+='<polygon points="'+exgPoly+' '+exgPts[exgPts.length-1].x+','+(exgH-2)+' '+exgPts[0].x+','+(exgH-2)+'" fill="'+sCol+'10"/>';
          html+='<polyline points="'+exgPoly+'" fill="none" stroke="'+sCol+'" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>';
          exgPts.forEach(function(p){
            html+='<circle cx="'+p.x+'" cy="'+p.y+'" r="3.5" fill="'+sCol+'" stroke="var(--bg3)" stroke-width="1.5"/>';
            html+='<text x="'+p.x+'" y="'+(p.y-7)+'" fill="#EEEEF2" font-size="7.5" font-family="Bebas Neue,sans-serif" text-anchor="middle">'+p.kg+'</text>';
            html+='<text x="'+p.x+'" y="'+(exgH+9)+'" fill="#666680" font-size="6.5" font-family="DM Sans,sans-serif" text-anchor="middle">W'+p.w+'</text>';
          });
          html+='</svg></div>';
        }

        // Week by week details
        var prevKg=null;
        weeks.forEach(function(w){
          var wData=allW[w];
          var kgMax=getBestKg(wData.serie);
          var dlt=kgMax&&prevKg?Math.round((kgMax-prevKg)*10)/10:null;
          html+='<div style="display:flex;align-items:flex-start;gap:8px;padding:8px;border-radius:8px;background:var(--bg3);margin-bottom:4px;">';
          // Week badge
          html+='<div style="min-width:28px;"><div style="font-family:Bebas Neue,sans-serif;font-size:14px;color:var(--muted);">W'+w+'</div>';
          if(dlt!==null)html+='<div style="font-size:9px;color:'+(dlt>0?'var(--green)':dlt<0?'var(--red)':'var(--muted)')+'">'+(dlt>0?'↑+':dlt<0?'↓':'')+Math.abs(dlt||0)+'</div>';
          html+='</div>';
          // Series blocks
          html+='<div style="flex:1;">';
          var groups={};
          wData.serie.forEach(function(s){var k=s.kg||'?';if(!groups[k])groups[k]=[];if(s.reps)groups[k].push(s.reps);});
          Object.keys(groups).forEach(function(kg){
            var rps=groups[kg];
            html+='<span style="display:inline-block;margin:2px 4px 2px 0;padding:3px 9px;border-radius:6px;background:var(--bg2);border:1px solid '+(parseFloat(kg)===kgMax?sCol:'var(--border)')+';font-size:12px;font-weight:600;color:'+(parseFloat(kg)===kgMax?sCol:'var(--text)')+'">'+kg+'kg'+(rps.length?' × '+rps.join(' '):'')+'</span>';
          });
          if(wData.nota)html+='<div style="font-size:10px;color:var(--muted);margin-top:3px;font-style:italic;">💬 '+wData.nota+'</div>';
          html+='</div>';
          html+='</div>';
          if(kgMax)prevKg=kgMax;
        });
        html+='</div>';
      });
    }
    html+='</div></div>';
    m.innerHTML=html;return;
  }
  // TIMER
  if(S.showTimer){
    var col=S.giorno?S.giorno.colore:'var(--accent)';
    html+='<div class="overlay" id="tmr-overlay"><div class="timer-box"><div style="display:flex;justify-content:space-between;align-items:center;width:100%;"><div style="font-size:12px;font-weight:600;color:var(--muted)">RECUPERO</div><button class="t-btn" id="t-close" style="background:var(--bg3);color:var(--muted);padding:5px 10px;font-size:12px;">✕</button></div><div class="timer-big" style="color:'+(S.timerDone?'var(--green)':(S.timerRun&&S.timerSecs>=1&&S.timerSecs<=5)?'#FF3B30':S.timerRun?col:'var(--text)')+'" data-countdown="'+(S.timerRun&&S.timerSecs>=1&&S.timerSecs<=5?'1':'0')+'">'+((S.timerRun&&S.timerSecs>=1&&S.timerSecs<=5)?String(S.timerSecs):fmtT(S.timerSecs))+'</div><div class="timer-presets">'
      +'<button class="t-pre" data-preset="45">45s</button><button class="t-pre" data-preset="60">1m</button><button class="t-pre" data-preset="90">1m30</button><button class="t-pre" data-preset="120">2m</button><button class="t-pre" data-preset="135">2m15</button><button class="t-pre" data-preset="150">2m30</button><button class="t-pre" data-preset="180">3m</button>'
      +'</div><div class="t-btns">'
      +(S.timerRun?'<button class="t-btn" id="t-pause" style="background:var(--bg3);color:var(--text);">Pausa</button>':'<button class="t-btn" id="t-start" style="background:'+col+';color:#fff;">▶ Start</button>')
      +'<button class="t-btn" id="t-reset" style="background:var(--bg3);color:var(--muted);">Reset</button>'
      +'</div>';
    // Per-exercise timer preference
    if(S.openExId){
      var curPref=getExTimerPref(S.openExId);
      html+='<div style="margin-top:8px;width:100%;text-align:center;">';
      html+='<div style="font-size:10px;color:var(--muted);margin-bottom:6px;">⏱ Tempo predefinito per questo esercizio: <b style="color:var(--text);">'+fmtT(curPref)+'</b></div>';
      html+='<div style="display:flex;gap:4px;justify-content:center;flex-wrap:wrap;">';
      [45,60,90,120,150,180].forEach(function(s){
        var isActive=curPref===s;
        html+='<button data-extimerpref="'+s+'" style="padding:4px 10px;border-radius:12px;border:1px solid '+(isActive?'var(--accent)':'var(--border2)')+';background:'+(isActive?'rgba(255,107,53,.15)':'transparent')+';color:'+(isActive?'var(--accent)':'var(--muted2)')+';font-size:10px;cursor:pointer;font-family:DM Sans,sans-serif;">'+fmtT(s)+'</button>';
      });
      html+='</div></div>';
    }
    html+='</div></div>';
    m.innerHTML=html;return;
  }
  // PROGRESSI
  if(S.showPerf){
    var g=S.giorno,sc2=SCHEDE[S.schedaId];
    var ex=g?g.esercizi.filter(function(e){return e.id===S.showPerf;})[0]:null;
    if(ex){
      var col2=g?g.colore:'var(--accent)';
      html+='<div class="perf-wrap" id="perf-overlay"><div class="perf-sheet"><div class="perf-handle"></div>';
      html+='<div class="perf-hdr"><div class="perf-ttl">'+htmlEsc(ex.nome)+'</div><button class="perf-x" id="perf-close">✕</button></div>';
      html+='<div class="perf-body">';

      // ── PROGRESSION GRAPH ──
      var graphPts=[];
      for(var gw=1;gw<=sc2.settimane;gw++){
        // Solo settimane effettivamente salvate
        var gwSaved=S.weekLogs[gw]&&S.weekLogs[gw].savedAt;
        if(!gwSaved)continue;
        var gwl=getExLog(ex.id,gw);
        if(gwl&&gwl.serie){
          var gTop=null;
          var repsTotal=0,repsCount=0;
          gwl.serie.forEach(function(gs){
            // Solo serie completate (done=true)
            if(!gs.done)return;
            var gk=parseFloat(String(gs.kg||'').replace(',','.'));
            if(!isNaN(gk)&&gk>0&&(gTop===null||gk>gTop))gTop=gk;
            var gr=parseInt(gs.reps||'');
            if(!isNaN(gr)&&gr>0){repsTotal+=gr;repsCount++;}
          });
          var gAvgReps=repsCount>0?Math.round(repsTotal/repsCount*10)/10:null;
          if(gTop!==null)graphPts.push({w:gw,kg:gTop,avgReps:gAvgReps});
        }
      }
      if(graphPts.length>=2){
        var gMin=Math.min.apply(null,graphPts.map(function(p){return p.kg;}))-1;
        var gMax=Math.max.apply(null,graphPts.map(function(p){return p.kg;}))+1;
        var gRange=gMax-gMin||1;
        var gW=300,gH=100;
        var gPts2=graphPts.map(function(p,i){
          return{x:20+i/(graphPts.length-1)*(gW-40),y:gH-10-((p.kg-gMin)/gRange)*(gH-24),kg:p.kg,w:p.w};
        });
        var gPoly=gPts2.map(function(p){return p.x+','+p.y;}).join(' ');
        var gArea=gPoly+' '+gPts2[gPts2.length-1].x+','+(gH-4)+' '+gPts2[0].x+','+(gH-4);
        var firstKg=graphPts[0].kg,lastKg=graphPts[graphPts.length-1].kg;
        var gDelta=Math.round((lastKg-firstKg)*10)/10;
        // Reps avg line
        var repsPts=graphPts.filter(function(p){return p.avgReps!==null;});
        var hasReps=repsPts.length>=2;
        var rMin=0,rMax=1,rRange2=1,rPts2=[],rPoly='';
        if(hasReps){
          rMin=Math.min.apply(null,repsPts.map(function(p){return p.avgReps;}))-1;
          rMax=Math.max.apply(null,repsPts.map(function(p){return p.avgReps;}))+1;
          rRange2=rMax-rMin||1;
          rPts2=repsPts.map(function(p){
            var xi=graphPts.indexOf(p);
            return{x:20+xi/(graphPts.length-1)*(gW-40),y:gH-10-((p.avgReps-rMin)/rRange2)*(gH-24),r:p.avgReps,w:p.w};
          });
          rPoly=rPts2.map(function(p){return p.x+','+p.y;}).join(' ');
        }

        html+='<div style="padding:12px 18px 14px;">';
        html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">';
        html+='<div style="font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;">📈 Progressione</div>';
        html+='<div style="font-size:12px;font-weight:700;color:'+(gDelta>0?'var(--green)':gDelta<0?'var(--red)':'var(--muted)')+';">'+(gDelta>0?'↑ +':'↓ ')+Math.abs(gDelta)+' kg</div>';
        html+='</div>';
        html+='<div style="display:flex;gap:12px;margin-bottom:8px;">';
        html+='<div style="display:flex;align-items:center;gap:5px;"><svg width="18" height="6" style="overflow:visible"><line x1="0" y1="3" x2="18" y2="3" stroke="'+col2+'" stroke-width="2.5" stroke-linecap="round"/></svg><span style="font-size:9px;color:var(--muted);">Kg</span></div>';
        if(hasReps)html+='<div style="display:flex;align-items:center;gap:5px;"><svg width="18" height="6" style="overflow:visible"><line x1="0" y1="3" x2="18" y2="3" stroke="#FFD060" stroke-width="2" stroke-dasharray="4,2" stroke-linecap="round"/></svg><span style="font-size:9px;color:var(--muted);">Reps medie</span></div>';
        html+='</div>';

        html+='<svg width="100%" viewBox="0 0 '+gW+' '+(gH+14)+'" preserveAspectRatio="xMidYMid meet" style="display:block;">';
        // Y-axis labels (kg scale left)
        for(var gy=0;gy<=3;gy++){
          var gyy=gH-10-(gy/3)*(gH-24);
          var gyv=Math.round((gMin+gy/3*gRange)*10)/10;
          html+='<line x1="18" y1="'+gyy+'" x2="'+gW+'" y2="'+gyy+'" stroke="#1E1E28" stroke-width="0.5"/>';
          html+='<text x="2" y="'+(gyy+3)+'" fill="#666680" font-size="7" font-family="DM Sans,sans-serif">'+gyv+'</text>';
        }
        // Area fill
        html+='<polygon points="'+gArea+'" fill="'+col2+'10"/>';
        // Kg Line
        html+='<polyline points="'+gPoly+'" fill="none" stroke="'+col2+'" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>';
        // Kg Points + labels
        gPts2.forEach(function(p,i){
          html+='<circle cx="'+p.x+'" cy="'+p.y+'" r="4" fill="'+col2+'" stroke="var(--bg2)" stroke-width="2"/>';
          html+='<text x="'+p.x+'" y="'+(p.y-8)+'" fill="#EEEEF2" font-size="8" font-family="Bebas Neue,sans-serif" text-anchor="middle" letter-spacing="0.5">'+p.kg+'</text>';
          html+='<text x="'+p.x+'" y="'+(gH+10)+'" fill="#666680" font-size="7" font-family="DM Sans,sans-serif" text-anchor="middle">W'+p.w+'</text>';
        });
        // Reps dashed yellow line (drawn after kg so visible on top)
        if(hasReps&&rPoly){
          html+='<polyline points="'+rPoly+'" fill="none" stroke="#FFD060" stroke-width="2" stroke-dasharray="5,3" stroke-linejoin="round" stroke-linecap="round"/>';
          rPts2.forEach(function(p){
            html+='<circle cx="'+p.x+'" cy="'+p.y+'" r="3" fill="#FFD060" stroke="var(--bg2)" stroke-width="1.5"/>';
            html+='<text x="'+p.x+'" y="'+(p.y+14)+'" fill="#FFD060" font-size="7" font-family="DM Sans,sans-serif" text-anchor="middle">'+p.r+'</text>';
          });
        }
        html+='</svg></div>';
        html+='<div style="height:1px;background:var(--border2);margin:0 18px;"></div>';
      }

      // ── WEEKLY DETAILS ──

      var prevPrescr='';
      for(var w=1;w<=sc2.settimane;w++){
        var wl=getExLog(ex.id,w);
        var isSaved=!!(S.weekLogs[w]&&S.weekLogs[w].savedAt);
        var isActive=(w===S.activeWeek);

        // Prescrizione settimana (mostra solo la nota della settimana corrente)
        var baseNote=ex.note||'';
        var weekNote=ex.noteW&&ex.noteW[w]?ex.noteW[w]:'';
        var prescr=weekNote?weekNote.replace(/^⚠️\s*/,''):baseNote;
        var prescrChanged=(prevPrescr!==''&&prescr!==prevPrescr);

        // Dati kg+reps -> stringa inline "30kg 7 6 6  |  24kg 13"
        // Solo per settimane effettivamente salvate
        var kgGroups={};
        if(isSaved&&wl&&wl.serie){
          wl.serie.forEach(function(s){
            if(!s.done)return; // solo serie completate
            var kg=s.kg||'?';
            if(!kgGroups[kg])kgGroups[kg]=[];
            if(s.reps)kgGroups[kg].push(s.reps);
          });
        }
        var kgSorted=Object.keys(kgGroups).map(parseFloat).filter(Boolean).sort(function(a,b){return b-a;});
        var hasData=kgSorted.length>0;

        // Componi stringa dati
        var dataStr='';
        if(hasData){
          dataStr=kgSorted.map(function(kg){
            var reps=kgGroups[String(kg)]||kgGroups[kg]||[];
            return kg+'kg '+(reps.join(' ')||'');
          }).join('  |  ');
        }

        // Colori riga
        var rowBg=prescrChanged?'rgba(255,208,96,.1)':isActive?'rgba(255,107,53,.07)':'';
        var prescrColor=prescrChanged?'var(--yellow)':col2;

        // UNA SOLA RIGA: W1  3×7  ·  30kg 7 6 6
        // Salta settimane non salvate e non attive
        if(!isSaved&&!isActive){prevPrescr=prescr;continue;}
        html+='<div style="display:flex;align-items:baseline;gap:0;padding:7px 18px;background:'+rowBg+';border-left:2px solid '+(prescrChanged?'var(--yellow)':isActive?'var(--accent)':'transparent')+';white-space:nowrap;overflow:hidden;">';

        // W badge
        html+='<span style="font-family:Bebas Neue,sans-serif;font-size:13px;min-width:26px;color:'+(isActive?'var(--accent)':isSaved?'var(--green)':'var(--muted2)')+';">W'+w+'</span>';

        // Prescrizione
        html+='<span style="font-family:Bebas Neue,sans-serif;font-size:14px;color:'+prescrColor+';min-width:80px;">'+htmlEsc(prescr)+'</span>';

        // Separatore + dati
        if(hasData){
          html+='<span style="color:var(--muted2);margin:0 6px;font-size:11px;">·</span>';
          html+='<span style="font-size:13px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;">'+htmlEsc(dataStr)+'</span>';
        } else {
          html+='<span style="font-size:11px;color:var(--muted2);margin-left:8px;">—</span>';
        }

        html+='</div>';
        // linea sottile tra righe
        html+='<div style="height:1px;background:var(--border2);margin:0 18px;"></div>';

        prevPrescr=prescr;
      }
      html+='</div></div></div>';
    }
    m.innerHTML=html;return;
  }
  // IMPORT SCHEDA MODAL
  if(S.showImport){
    html+='<div class="overlay" id="import-overlay" style="align-items:flex-end;">';
    html+='<div style="background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:500px;padding:24px 24px 44px;">';
    html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">';
    html+='<div style="font-size:18px;font-weight:800;">📥 Importa Scheda</div>';
    html+='<button id="import-modal-close" style="background:var(--bg3);border:1px solid var(--border);border-radius:50%;width:32px;height:32px;font-size:15px;cursor:pointer;color:var(--muted);">✕</button>';
    html+='</div>';
    html+='<label for="import-scheda-file" style="display:block;border:2px dashed var(--border);border-radius:16px;padding:30px 20px;text-align:center;cursor:pointer;background:var(--bg3);margin-bottom:16px;">';
    html+='<div style="font-size:36px;margin-bottom:10px;">📂</div>';
    html+='<div style="font-size:15px;font-weight:700;margin-bottom:4px;">Tocca per scegliere il file</div>';
    html+='<div style="font-size:12px;color:var(--muted);">Carica il file .xlsx o .docx del trainer</div>';
    html+='</label>';
    html+='<div style="padding:14px;background:var(--bg3);border-radius:12px;border:1px solid var(--border)">';
    html+='<div style="font-size:10px;font-weight:800;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;">Come funziona</div>';
    html+='<div style="font-size:12px;color:var(--muted);line-height:1.8;">1. Il trainer ti manda il file Excel<br>2. Caricalo qui<br>3. App legge esercizi e prescrizioni W1-W7<br>4. Inizia ad allenarti subito</div>';
    html+='</div>';
    html+='</div></div>';
    m.innerHTML=html;return;
  }
  // AI COACH
  if(S.showAI){
    html+='<div class="ai-wrap" id="ai-overlay"><div class="ai-sheet"><div class="ai-handle"></div><div class="ai-hdr"><span style="font-size:20px">🤖</span><div><div class="ai-ttl">Coach AI</div><div class="ai-sub">Scheda #'+S.schedaId+' · Settimana '+S.activeWeek+'</div></div><button class="ai-x" id="ai-close">✕</button></div><div class="ai-msgs" id="ai-msgs">';
    if(!S.aiMsgs.length)html+='<div class="msg ai"><div class="msg-b">Ciao! Sono il tuo coach. Dimmi come stai andando, cosa fare con i pesi, o chiedi un consiglio.</div></div>';
    S.aiMsgs.forEach(function(m2){html+='<div class="msg '+m2.role+'"><div class="msg-b">'+m2.content+'</div></div>';});
    if(S.aiLoad)html+='<div class="msg ai"><div class="msg-b"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div></div>';
    html+='</div><div class="ai-chips"><button class="chip" data-chip="Come sto progredendo?">📈 Progressi</button><button class="chip" data-chip="Consigli per i pesi?">💡 Pesi</button><button class="chip" data-chip="Sono in forma?">🏆 Forma</button></div><div class="ai-inp-row"><textarea class="ai-ta" id="ai-inp" placeholder="Scrivi qui..." rows="1"></textarea><button class="ai-send" id="ai-send" '+(S.aiLoad?'disabled':'')+'>↑</button></div></div></div>';
    m.innerHTML=html;
    var msgs=document.getElementById('ai-msgs');if(msgs)msgs.scrollTop=msgs.scrollHeight;
    return;
  }
  // CALCULATOR
  if(S.showCalc){
    html+='<div class="calc-wrap" id="calc-overlay"><div class="calc-sheet">';
    html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;"><div style="font-family:Bebas Neue,sans-serif;font-size:20px;letter-spacing:1px;">🧮 Calcolatrice</div><button id="calc-close" style="background:var(--bg3);border:1px solid var(--border);border-radius:50%;width:32px;height:32px;font-size:14px;cursor:pointer;color:var(--muted);">✕</button></div>';
    html+='<div class="calc-display"><div class="calc-expr">'+htmlEsc(S.calcExpr)+'</div><div class="calc-result">'+htmlEsc(S.calcResult)+'</div></div>';
    // Fitness shortcuts
    html+='<div style="display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;">';
    html+='<button class="calc-btn fn" data-calcfn="pct" style="padding:8px 12px;font-size:11px;">% di</button>';
    html+='<button class="calc-btn fn" data-calcfn="minus20" style="padding:8px 12px;font-size:11px;">-20%</button>';
    html+='<button class="calc-btn fn" data-calcfn="minus30" style="padding:8px 12px;font-size:11px;">-30%</button>';
    html+='<button class="calc-btn fn" data-calcfn="1rm" style="padding:8px 12px;font-size:11px;">1RM</button>';
    html+='</div>';
    html+='<div class="calc-grid">';
    ['7','8','9','÷','4','5','6','×','1','2','3','−','0','.','⌫','+'
    ].forEach(function(b){
      var cls=('÷×−+').indexOf(b)>=0?'calc-btn op':'calc-btn';
      html+='<button class="'+cls+'" data-calcbtn="'+b+'">'+b+'</button>';
    });
    html+='<button class="calc-btn" data-calcbtn="C" style="color:var(--red);">C</button>';
    html+='<button class="calc-btn" data-calcbtn="(" >(</button>';
    html+='<button class="calc-btn" data-calcbtn=")" >)</button>';
    html+='<button class="calc-btn eq" data-calcbtn="=">=</button>';
    html+='</div></div></div>';
    m.innerHTML=html;return;
  }
  m.innerHTML='';
  }catch(err){m.innerHTML='';console.error('Modal render error:',err);}
}

// ─── EXPORT LOGBOOK EXCEL ─────────────────────────────────────────────────────
function exportLogbook(){
  var sc = SCHEDE[S.schedaId];
  if(!sc){ alert('Nessuna scheda attiva.'); return; }
  var W = sc.settimane;

  // ── Helper: extract sorted unique KG values from a week's session for one exercise ──
  function getWeekKgs(giornoId, exId, w){
    var key = 'pier_s'+S.schedaId+'_g'+giornoId+'_w'+w;
    var raw = localStorage.getItem(key);
    if(!raw) return null;
    try{
      var d = JSON.parse(raw);
      var ex = d.esercizi ? d.esercizi.filter(function(e){ return e.id===exId; })[0] : null;
      if(!ex || !ex.serie || !ex.serie.length) return null;
      // Collect all unique valid kg values (in order of appearance, drop duplicates)
      var seen = [];
      ex.serie.forEach(function(s){
        if(s.done && s.kg && String(s.kg).trim()){
          // Parse: handle "30", "30 25", "30-25", "14 12" etc.
          // We take only numeric-ish values, split by space/dash
          var parts = String(s.kg).split(/[\s\-\/,]+/).map(function(p){
            return parseFloat(p.replace(',','.'));
          }).filter(function(v){ return !isNaN(v) && v>0; });
          parts.forEach(function(v){
            if(seen.indexOf(v)<0) seen.push(v);
          });
        }
      });
      return seen.length ? seen : null;
    }catch(err){ return null; }
  }

  // ── Format kg array as "30KG" or "30-25KG" ──
  function fmtKg(kgs){
    // Sort descending (heaviest first)
    var sorted = kgs.slice().sort(function(a,b){ return b-a; });
    // Format numbers: remove trailing .0
    var strs = sorted.map(function(v){
      return v === Math.floor(v) ? String(Math.floor(v)) : String(v);
    });
    return strs.join('-') + 'KG';
  }

  // ── Check if two kg arrays are equal ──
  function kgsEqual(a, b){
    if(!a && !b) return true;
    if(!a || !b) return false;
    if(a.length !== b.length) return false;
    var as = a.slice().sort(function(x,y){return y-x;});
    var bs = b.slice().sort(function(x,y){return y-x;});
    for(var i=0;i<as.length;i++) if(as[i]!==bs[i]) return false;
    return true;
  }

  // ── Build the worksheet data ──
  var wsData = [];

  // Row 1: empty
  wsData.push([]);

  // Row 2: title
  var titleRow = [null, sc.nome + ' - DURATA '+W+' SETTIMANE'];
  wsData.push(titleRow);

  // Row 3: athlete name
  wsData.push([null, 'PIERFRANCESCO PULICE']);

  // Row 4: empty
  wsData.push([]);

  // Row 5-8: notes
  wsData.push([null, 'SCELTA DEL CARICO']);
  wsData.push([null, 'PERCENTUALE SUL MASSIMALE DOVE INDICATO']);
  wsData.push([]);
  wsData.push([null, 'ADDOME PRIMA DI OGNI SEDUTA (ALTERNA CRUNCH AL CAVO ALTO IN GINOCCHIO, SIT UP ALLA HYPEREXTENSION, CRUNCH MACHINE, ROTELLA)']);

  sc.giorni.forEach(function(g){
    // Empty row before day
    wsData.push([]);

    // Day header row: B=GIORNO X, C=RIPOSO, D..D+W=SETTIMANA 1..W
    var hdrRow = [null, 'GIORNO '+g.id, 'RIPOSO '];
    for(var w=1;w<=W;w++) hdrRow.push('SETTIMANA '+w);
    wsData.push(hdrRow);

    // Empty row after header
    wsData.push([]);

    g.esercizi.forEach(function(ex){
      var row = [null, ex.nome, 'LIBERO'];

      // W1 = always the trainer prescription note
      row.push(ex.note || '');

      // W2..W7: compute pesi usati logic
      var prevKgs = getWeekKgs(g.id, ex.id, 1); // W1 baseline

      for(var w=2; w<=W; w++){
        var trainerNote = (ex.noteW && ex.noteW[w]) ? ex.noteW[w].replace(/^\[W\d+\]\s*/,'') : (ex.note||'');
        var curKgs = getWeekKgs(g.id, ex.id, w);

        if(curKgs && !kgsEqual(curKgs, prevKgs)){
          // Weight changed (or first appearance) — show weight
          row.push(fmtKg(curKgs));
          prevKgs = curKgs;
        } else if(curKgs && kgsEqual(curKgs, prevKgs) && w===2 && prevKgs){
          // W2: show weight even if same as W1 (baseline reference, as in your example)
          row.push(fmtKg(curKgs));
        } else {
          // No change or no data — show trainer note for this week
          row.push(trainerNote);
        }
      }

      wsData.push(row);
    });
  });

  // ── Build workbook ──
  var wb = XLSX.utils.book_new();
  var ws = XLSX.utils.aoa_to_sheet(wsData);

  // Column widths
  ws['!cols'] = [
    {wch:4},   // A
    {wch:60},  // B - exercise names
    {wch:10},  // C
    {wch:30},  // D - W1
    {wch:18},{wch:18},{wch:18},{wch:18},{wch:18},{wch:18},{wch:18} // W2-W8
  ];

  XLSX.utils.book_append_sheet(wb, ws, 'SCHEDA_'+S.schedaId+'_PESI');

  // ── Download ──
  var fname = 'LOGBOOK_SCHEDA_'+S.schedaId+'_PESI_USATI.xlsx';
  XLSX.writeFile(wb, fname);
}

// ─── EXPORT LOGBOOK COMPLETO ─────────────────────────────────────────────────
function exportLogbookCompleto(){
  var sc = SCHEDE[S.schedaId];
  if(!sc){ alert('Nessuna scheda attiva.'); return; }
  var W = sc.settimane;
  var wb = XLSX.utils.book_new();

  // ── 1. DASHBOARD SHEET ──
  var dash = [];
  dash.push(['🏋️ LOGBOOK ALLENAMENTO - SCHEDA #'+sc.id]);
  dash.push([]);
  dash.push(['📅 CALENDARIO ALLENAMENTI']);
  // Header row
  var dhdr = [''];
  sc.giorni.forEach(function(g){ dhdr.push('G'+g.id); });
  dash.push(dhdr);
  // Week rows
  for(var w=1; w<=W; w++){
    var drow = ['W'+w];
    sc.giorni.forEach(function(g){
      var d = LS.get('pier_s'+S.schedaId+'_g'+g.id+'_w'+w);
      drow.push(d&&d.savedAt ? '☑' : '☐');
    });
    dash.push(drow);
  }
  var wsDash = XLSX.utils.aoa_to_sheet(dash);
  wsDash['!cols'] = [{wch:8}].concat(sc.giorni.map(function(){return{wch:6};}));
  XLSX.utils.book_append_sheet(wb, wsDash, '📍 DASHBOARD');

  // ── 2. PROGRESSIONE SHEET ──
  var prog = [];
  prog.push(['📊 PROGRESSIONE PESO - MONITORAGGIO SETTIMANA PER SETTIMANA']);
  var phdr = ['ESERCIZIO'];
  for(var w=1;w<=W;w++) phdr.push('SETT.'+w);
  phdr.push('GIORNO');phdr.push('Δ KG (W1→W'+W+')');phdr.push('Δ %');
  prog.push(phdr);

  sc.giorni.forEach(function(g){
    g.esercizi.forEach(function(ex){
      var prow = [ex.nome];
      var firstKg=null, lastKg=null;
      for(var w=1;w<=W;w++){
        var d=LS.get('pier_s'+S.schedaId+'_g'+g.id+'_w'+w);
        var exLog=d&&d.esercizi?d.esercizi.filter(function(e2){return e2.id===ex.id;})[0]:null;
        if(exLog&&exLog.serie&&exLog.serie.length){
          // Get best kg (first set's kg, which is the main working weight)
          var kgs=[];
          exLog.serie.forEach(function(s){
            if(s.kg){
              var kv=parseFloat(String(s.kg).replace(',','.'));
              if(!isNaN(kv)&&kv>0&&kgs.indexOf(kv)<0)kgs.push(kv);
            }
          });
          if(kgs.length){
            kgs.sort(function(a,b){return b-a;});
            var topKg=kgs[0];
            if(firstKg===null)firstKg=topKg;
            lastKg=topKg;
            // Multi-kg display with newlines
            if(kgs.length>1) prow.push(kgs.join('\n'));
            else prow.push(topKg);
          }else prow.push('');
        }else prow.push('');
      }
      prow.push('G'+g.id);
      // Delta
      if(firstKg!==null&&lastKg!==null){
        var dkg=Math.round((lastKg-firstKg)*10)/10;
        var dpct=firstKg>0?Math.round(dkg/firstKg*100)+'%':'';
        prow.push(dkg);prow.push(dpct);
      }else{prow.push('');prow.push('');}
      prog.push(prow);
    });
  });

  var wsProg = XLSX.utils.aoa_to_sheet(prog);
  wsProg['!cols'] = [{wch:55},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10},{wch:8},{wch:14},{wch:8}];
  XLSX.utils.book_append_sheet(wb, wsProg, '📊 PROGRESSIONE');

  // ── 3. PER-GIORNO SHEETS ──
  sc.giorni.forEach(function(g){
    var gdata = [];
    gdata.push(['GIORNO '+g.id]);

    g.esercizi.forEach(function(ex){
      gdata.push([ex.nome]);
      gdata.push(['#','KG','REPS','NOTE','Δ']);

      var prevTopKg = null;
      for(var w=1;w<=W;w++){
        var d=LS.get('pier_s'+S.schedaId+'_g'+g.id+'_w'+w);
        var exLog=d&&d.esercizi?d.esercizi.filter(function(e2){return e2.id===ex.id;})[0]:null;

        if(exLog&&exLog.serie&&exLog.serie.length){
          // Collect all unique kg and all reps
          var kgParts=[], repsParts=[];
          exLog.serie.forEach(function(s){
            if(s.kg)kgParts.push(s.kg);
            if(s.reps)repsParts.push(s.reps);
          });
          var kgStr=kgParts.join('\n');
          var repsStr=repsParts.join(' ');

          // Note: trainer prescription for this week
          var noteStr='';
          if(w===1&&ex.note)noteStr=ex.note;
          else if(ex.noteW&&ex.noteW[w])noteStr=String(ex.noteW[w]).replace(/^⚠️\s*/,'');
          if(exLog.nota)noteStr+=(noteStr?' | ':'')+exLog.nota;

          // Delta from prev week's top kg
          var topKg=null;
          exLog.serie.forEach(function(s){
            var kv=parseFloat(String(s.kg||'').replace(',','.'));
            if(!isNaN(kv)&&kv>0&&(topKg===null||kv>topKg))topKg=kv;
          });
          var delta='';
          if(topKg!==null&&prevTopKg!==null){
            var dv=Math.round((topKg-prevTopKg)*10)/10;
            delta=dv>0?'+'+dv:dv<0?String(dv):'';
          }else if(topKg===null){delta='-';}
          else{delta='-';}

          gdata.push([w+'.0', kgStr, repsStr, noteStr, delta]);
          if(topKg!==null)prevTopKg=topKg;
        }else{
          gdata.push([w+'.0', '', '', '', '-']);
        }
      }
      gdata.push([]); // blank row between exercises
    });

    var wsG = XLSX.utils.aoa_to_sheet(gdata);
    wsG['!cols'] = [{wch:6},{wch:20},{wch:25},{wch:40},{wch:8}];
    XLSX.utils.book_append_sheet(wb, wsG, 'GIORNO_'+g.id);
  });

  var fname = 'LOGBOOK_SCHEDA_'+S.schedaId+'_COMPLETO.xlsx';
  XLSX.writeFile(wb, fname);
}
